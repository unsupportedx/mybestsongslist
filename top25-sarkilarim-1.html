<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>En İyi 25 Şarkım</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: #0a0a0f; font-family: 'Georgia', serif; padding-bottom: 60px; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #c9a84c; border-radius: 3px; }

  /* HEADER */
  .header { background: linear-gradient(180deg, #1a1206 0%, #0a0a0f 100%); border-bottom: 1px solid #2a2010; padding: 40px 20px 30px; text-align: center; position: relative; overflow: hidden; }
  .header-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%); pointer-events: none; }
  .vinyl { width: 64px; height: 64px; border-radius: 50%; background: repeating-radial-gradient(circle at 50%, #111 0px, #1a1a1a 2px, #0d0d0d 4px, #1a1a1a 6px); border: 2px solid #333; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; animation: spin 8s linear infinite; }
  .vinyl-center { width: 16px; height: 16px; border-radius: 50%; background: #c9a84c; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .title { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 900; color: #f5e6c0; letter-spacing: -1px; line-height: 1; }
  .title span { color: #c9a84c; font-style: italic; }
  .subtitle { font-family: 'Space Mono', monospace; font-size: 11px; color: #666; margin-top: 8px; letter-spacing: 3px; text-transform: uppercase; }
  .header-btns { margin-top: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn-add-main { background: linear-gradient(135deg, #c9a84c, #a07830); color: #0a0a0f; padding: 10px 24px; border-radius: 6px; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; letter-spacing: 1px; border: none; cursor: pointer; transition: transform 0.2s, opacity 0.2s; }
  .btn-add-main:hover { transform: scale(1.05); }
  .drag-hint { background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 6px; padding: 10px 20px; font-family: 'Space Mono', monospace; font-size: 11px; color: #888; }

  /* LIST */
  .list-container { max-width: 780px; margin: 0 auto; padding: 30px 16px 0; }
  .empty-state { text-align: center; padding: 80px 20px; color: #444; }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-title { font-family: 'Playfair Display', serif; font-size: 22px; color: #666; }
  .empty-sub { font-family: 'Space Mono', monospace; font-size: 12px; color: #444; margin-top: 8px; }

  /* ROW WRAPPER */
  .row-wrap { position: relative; }
  .insert-zone { display: flex; justify-content: center; margin: 2px 0; height: 24px; align-items: center; }
  .btn-insert { opacity: 0; background: rgba(201,168,76,0.15); border: 1px dashed #c9a84c; color: #c9a84c; border-radius: 20px; padding: 2px 14px; font-size: 11px; font-family: 'Space Mono', monospace; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; }
  .row-wrap:hover .btn-insert { opacity: 1; }

  /* SONG ROW */
  .song-row { display: flex; align-items: center; gap: 16px; padding: 14px 18px; border-radius: 10px; margin-bottom: 6px; cursor: grab; transition: background 0.2s, border-color 0.2s, opacity 0.2s; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.02); }
  .song-row:hover { background: rgba(201,168,76,0.05) !important; }
  .song-row.rank-1 { border-color: rgba(255,215,0,0.2); background: rgba(255,215,0,0.04); }
  .song-row.rank-2 { border-color: rgba(192,192,192,0.2); background: rgba(192,192,192,0.04); }
  .song-row.rank-3 { border-color: rgba(205,127,50,0.2); background: rgba(205,127,50,0.04); }
  .song-row.dragging { opacity: 0.4; cursor: grabbing; }
  .song-row.drag-over { border-top: 2px solid #c9a84c; }

  /* RANK */
  .rank-num { min-width: 52px; text-align: center; font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; line-height: 1; }
  .rank-medal { font-size: 24px; line-height: 1; }

  /* SONG INFO */
  .song-info { flex: 1; min-width: 0; }
  .song-title { font-family: 'Playfair Display', serif; font-size: 17px; color: #f5e6c0; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-meta { display: flex; gap: 10px; margin-top: 3px; flex-wrap: wrap; align-items: center; }
  .song-artist { font-family: 'Space Mono', monospace; font-size: 12px; color: #c9a84c; }
  .song-year { font-family: 'Space Mono', monospace; font-size: 11px; color: #555; }
  .song-genre { background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2); border-radius: 20px; padding: 1px 8px; font-size: 10px; color: #a07830; font-family: 'Space Mono', monospace; }

  /* EDIT INPUTS */
  .edit-fields { flex: 1; display: flex; gap: 8px; flex-wrap: wrap; }
  .edit-fields input, .edit-fields select { background: #1a1a2e; border: 1px solid #555; border-radius: 6px; padding: 7px 12px; color: #ccc; font-size: 13px; font-family: 'Georgia', serif; outline: none; }
  .edit-fields input:first-child { flex: 2 1 140px; border-color: #c9a84c; color: #f5e6c0; font-size: 14px; }
  .edit-fields input:nth-child(2) { flex: 1 1 110px; }
  .edit-fields input:nth-child(3) { flex: 0 1 70px; }
  .edit-fields select { flex: 1 1 100px; }

  /* ACTION BUTTONS */
  .actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn { cursor: pointer; border: none; transition: transform 0.2s; border-radius: 6px; padding: 7px 12px; font-size: 14px; }
  .btn:hover { transform: scale(1.08); }
  .btn-edit { background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2) !important; color: #c9a84c; }
  .btn-del { background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2) !important; color: #ff6060; }
  .btn-save { background: #1a4a1a; border: 1px solid #2d7a2d !important; color: #6fd46f; font-family: 'Space Mono', monospace; font-size: 12px; padding: 7px 14px; }
  .btn-cancel { background: transparent; border: 1px solid #444 !important; color: #888; font-size: 12px; }

  /* END ADD BUTTON */
  .btn-end-add { background: transparent; border: 1px dashed #333; color: #555; border-radius: 8px; padding: 12px 32px; font-size: 12px; font-family: 'Space Mono', monospace; cursor: pointer; width: 100%; margin-top: 10px; transition: border-color 0.2s, color 0.2s; }
  .btn-end-add:hover { border-color: #c9a84c; color: #c9a84c; }

  /* MODAL */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .modal { background: #0f0f1a; border-radius: 16px; padding: 32px; width: 100%; max-width: 460px; box-shadow: 0 0 60px rgba(201,168,76,0.15); }
  .modal.delete { border: 1px solid #ff4040; max-width: 340px; text-align: center; }
  .modal.add { border: 1px solid #c9a84c; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 24px; color: #f5e6c0; margin-bottom: 6px; }
  .modal-sub { font-family: 'Space Mono', monospace; font-size: 11px; color: #666; margin-bottom: 24px; }
  .modal-icon { font-size: 36px; margin-bottom: 12px; }
  .modal-del-title { font-family: 'Playfair Display', serif; font-size: 20px; color: #f5e6c0; margin-bottom: 8px; }
  .modal-del-sub { font-family: 'Space Mono', monospace; font-size: 12px; color: #666; margin-bottom: 22px; }
  .field-group { display: flex; flex-direction: column; gap: 12px; }
  .field-label { font-family: 'Space Mono', monospace; font-size: 10px; color: #888; letter-spacing: 1px; display: block; margin-bottom: 5px; }
  .field-row { display: flex; gap: 10px; }
  .field-row > div { flex: 1; }
  .modal input, .modal select { width: 100%; background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 11px 14px; color: #f5e6c0; font-family: 'Georgia', serif; font-size: 15px; outline: none; transition: border-color 0.2s; }
  .modal input:focus { border-color: #c9a84c; }
  .modal input::placeholder { color: #444; }
  .modal-btns { display: flex; gap: 10px; margin-top: 24px; }
  .btn-modal-confirm { flex: 1; background: linear-gradient(135deg, #c9a84c, #a07830); color: #0a0a0f; padding: 13px; border-radius: 8px; font-family: 'Space Mono', monospace; font-weight: 700; font-size: 13px; border: none; cursor: pointer; transition: transform 0.2s, opacity 0.2s; }
  .btn-modal-confirm:disabled { background: #2a2010; color: #555; cursor: not-allowed; transform: none; }
  .btn-modal-confirm:not(:disabled):hover { transform: scale(1.03); }
  .btn-modal-cancel { background: transparent; border: 1px solid #333; color: #888; padding: 13px 20px; border-radius: 8px; font-family: 'Space Mono', monospace; font-size: 13px; cursor: pointer; transition: border-color 0.2s; }
  .btn-modal-cancel:hover { border-color: #666; }
  .btn-del-confirm { flex: 1; background: #4a1a1a; border: 1px solid #ff4040; color: #ff6060; padding: 12px; border-radius: 8px; font-family: 'Space Mono', monospace; font-weight: 700; font-size: 13px; cursor: pointer; transition: transform 0.2s; }
  .btn-del-confirm:hover { transform: scale(1.03); }
  .btn-del-cancel { flex: 1; background: transparent; border: 1px solid #333; color: #888; padding: 12px; border-radius: 8px; font-family: 'Space Mono', monospace; font-size: 13px; cursor: pointer; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-glow"></div>
  <div class="vinyl"><div class="vinyl-center"></div></div>
  <div class="title">En İyi <span>25</span> Şarkım</div>
  <div class="subtitle" id="subtitle">Kişisel Müzik Listem • 5/25 Şarkı</div>
  <div class="header-btns">
    <button class="btn-add-main" onclick="openAdd(null)">+ Şarkı Ekle</button>
    <div class="drag-hint">↕ Sürükle-Bırak ile Sırala</div>
  </div>
</div>

<!-- LIST -->
<div class="list-container">
  <div id="empty-state" class="empty-state hidden">
    <div class="empty-icon">🎵</div>
    <div class="empty-title">Henüz şarkı yok</div>
    <div class="empty-sub">Yukarıdaki butona tıkla ve ilk şarkını ekle</div>
  </div>
  <div id="song-list"></div>
  <button class="btn-end-add" id="btn-end-add" onclick="openAdd(null)">+ Sona Ekle</button>
</div>

<!-- ADD MODAL -->
<div class="modal-backdrop hidden" id="add-modal" onclick="closeAdd(event)">
  <div class="modal add" onclick="event.stopPropagation()">
    <div class="modal-title">Şarkı Ekle</div>
    <div class="modal-sub" id="add-modal-sub">Listeye eklenecek</div>
    <div class="field-group">
      <div>
        <label class="field-label">ŞARKI ADI *</label>
        <input id="add-title" placeholder="örn: Bohemian Rhapsody" oninput="validateAdd()" onkeydown="if(event.key==='Enter')confirmAdd()">
      </div>
      <div>
        <label class="field-label">SANATÇI *</label>
        <input id="add-artist" placeholder="örn: Queen" oninput="validateAdd()" onkeydown="if(event.key==='Enter')confirmAdd()">
      </div>
      <div class="field-row">
        <div>
          <label class="field-label">YIL</label>
          <input id="add-year" placeholder="1975" maxlength="4" style="font-size:14px">
        </div>
        <div>
          <label class="field-label">TÜR</label>
          <select id="add-genre" style="font-size:14px">
            <option>Pop</option><option>Rock</option><option>Jazz</option><option>Hip-Hop</option>
            <option>R&B</option><option>Electronic</option><option>Classical</option><option>Folk</option>
            <option>Grunge</option><option>Metal</option><option>Soul</option><option>Indie</option><option>Diğer</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-modal-confirm" id="btn-confirm-add" onclick="confirmAdd()" disabled>Listeye Ekle</button>
      <button class="btn-modal-cancel" onclick="closeAddModal()">İptal</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-backdrop hidden" id="del-modal" onclick="closeDelModal()">
  <div class="modal delete" onclick="event.stopPropagation()">
    <div class="modal-icon">🗑️</div>
    <div class="modal-del-title">Şarkıyı Sil?</div>
    <div class="modal-del-sub">Bu işlem geri alınamaz.</div>
    <div class="modal-btns">
      <button class="btn-del-confirm" onclick="confirmDelete()">Evet, Sil</button>
      <button class="btn-del-cancel" onclick="closeDelModal()">Vazgeç</button>
    </div>
  </div>
</div>

<script>
const GENRES = ["Pop","Rock","Jazz","Hip-Hop","R&B","Electronic","Classical","Folk","Grunge","Metal","Soul","Indie","Diğer"];

let songs = [
  { id: 1, title: "Bohemian Rhapsody", artist: "Queen", year: "1975", genre: "Rock" },
  { id: 2, title: "Billie Jean", artist: "Michael Jackson", year: "1982", genre: "Pop" },
  { id: 3, title: "Hotel California", artist: "Eagles", year: "1977", genre: "Rock" },
  { id: 4, title: "Smells Like Teen Spirit", artist: "Nirvana", year: "1991", genre: "Grunge" },
  { id: 5, title: "Purple Rain", artist: "Prince", year: "1984", genre: "R&B" },
];

let nextId = 100;
let editingId = null;
let deleteTargetId = null;
let addAtIndex = null;
let dragSrcIdx = null;

function rankLabel(rank) {
  if (rank === 1) return '<span class="rank-medal">🥇</span>';
  if (rank === 2) return '<span class="rank-medal">🥈</span>';
  if (rank === 3) return '<span class="rank-medal">🥉</span>';
  const colors = { default: "#888" };
  const color = rank <= 10 ? "#c9a84c" : "#666";
  return `<span class="rank-num" style="color:${color}">${rank}</span>`;
}

function renderList() {
  const list = document.getElementById('song-list');
  const empty = document.getElementById('empty-state');
  const endBtn = document.getElementById('btn-end-add');
  const subtitle = document.getElementById('subtitle');
  subtitle.textContent = `Kişisel Müzik Listem • ${songs.length}/25 Şarkı`;

  if (songs.length === 0) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
    endBtn.classList.add('hidden');
    return;
  }
  empty.classList.add('hidden');
  endBtn.classList.remove('hidden');
  endBtn.textContent = songs.length < 25 ? `+ Sona Ekle (${songs.length + 1}. sıra)` : '';
  endBtn.style.display = songs.length < 25 ? '' : 'none';

  list.innerHTML = songs.map((song, idx) => {
    const rank = idx + 1;
    const rankClass = rank <= 3 ? `rank-${rank}` : '';
    const isEditing = editingId === song.id;

    const insertBtn = songs.length < 25
      ? `<div class="insert-zone"><button class="btn-insert" onclick="openAdd(${idx})">+ Buraya Ekle (${rank}. sıraya)</button></div>`
      : `<div class="insert-zone"></div>`;

    const rowContent = isEditing ? `
      <div class="edit-fields">
        <input id="edit-title-${song.id}" value="${esc(song.title)}" placeholder="Şarkı adı">
        <input id="edit-artist-${song.id}" value="${esc(song.artist)}" placeholder="Sanatçı">
        <input id="edit-year-${song.id}" value="${esc(song.year)}" placeholder="Yıl" maxlength="4">
        <select id="edit-genre-${song.id}">
          ${GENRES.map(g => `<option${g===song.genre?' selected':''}>${g}</option>`).join('')}
        </select>
      </div>
      <div class="actions">
        <button class="btn btn-save" onclick="saveEdit(${song.id})">✓ Kaydet</button>
        <button class="btn btn-cancel" onclick="cancelEdit()">✕</button>
      </div>
    ` : `
      <div class="song-info">
        <div class="song-title">${esc(song.title)}</div>
        <div class="song-meta">
          <span class="song-artist">${esc(song.artist)}</span>
          ${song.year ? `<span class="song-year">${esc(song.year)}</span>` : ''}
          ${song.genre ? `<span class="song-genre">${esc(song.genre)}</span>` : ''}
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-edit" onclick="startEdit(${song.id})" title="Düzenle">✎</button>
        <button class="btn btn-del" onclick="openDelete(${song.id})" title="Sil">✕</button>
      </div>
    `;

    return `
      <div class="row-wrap" id="wrap-${song.id}">
        ${insertBtn}
        <div class="song-row ${rankClass}${isEditing?' editing':''}"
          id="row-${song.id}"
          draggable="${!isEditing}"
          ondragstart="onDragStart(event,${idx})"
          ondragover="onDragOver(event,${idx})"
          ondrop="onDrop(event,${idx})"
          ondragend="onDragEnd()"
        >
          <div style="min-width:52px;text-align:center">${rankLabel(rank)}</div>
          ${rowContent}
        </div>
      </div>
    `;
  }).join('');
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// EDIT
function startEdit(id) {
  editingId = id;
  renderList();
  const input = document.getElementById(`edit-title-${id}`);
  if (input) input.focus();
}
function cancelEdit() { editingId = null; renderList(); }
function saveEdit(id) {
  const title = document.getElementById(`edit-title-${id}`).value.trim();
  const artist = document.getElementById(`edit-artist-${id}`).value.trim();
  const year = document.getElementById(`edit-year-${id}`).value.trim();
  const genre = document.getElementById(`edit-genre-${id}`).value;
  if (!title || !artist) return;
  songs = songs.map(s => s.id === id ? { ...s, title, artist, year, genre } : s);
  editingId = null;
  renderList();
}

// ADD
function openAdd(idx) {
  addAtIndex = idx;
  document.getElementById('add-title').value = '';
  document.getElementById('add-artist').value = '';
  document.getElementById('add-year').value = '';
  document.getElementById('add-genre').selectedIndex = 0;
  document.getElementById('btn-confirm-add').disabled = true;
  const pos = idx === null ? songs.length + 1 : idx + 1;
  document.getElementById('add-modal-sub').textContent = `${pos}. sıraya eklenecek`;
  document.getElementById('add-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('add-title').focus(), 50);
}
function closeAdd(e) { if (e.target === document.getElementById('add-modal')) closeAddModal(); }
function closeAddModal() { document.getElementById('add-modal').classList.add('hidden'); }
function validateAdd() {
  const t = document.getElementById('add-title').value.trim();
  const a = document.getElementById('add-artist').value.trim();
  document.getElementById('btn-confirm-add').disabled = !(t && a);
}
function confirmAdd() {
  const title = document.getElementById('add-title').value.trim();
  const artist = document.getElementById('add-artist').value.trim();
  if (!title || !artist) return;
  const year = document.getElementById('add-year').value.trim();
  const genre = document.getElementById('add-genre').value;
  const song = { id: nextId++, title, artist, year, genre };
  const idx = addAtIndex === null ? songs.length : addAtIndex;
  songs.splice(idx, 0, song);
  if (songs.length > 25) songs = songs.slice(0, 25);
  closeAddModal();
  renderList();
}

// DELETE
function openDelete(id) {
  deleteTargetId = id;
  document.getElementById('del-modal').classList.remove('hidden');
}
function closeDelModal() { document.getElementById('del-modal').classList.add('hidden'); deleteTargetId = null; }
function confirmDelete() {
  songs = songs.filter(s => s.id !== deleteTargetId);
  closeDelModal();
  renderList();
}

// DRAG & DROP
function onDragStart(e, idx) {
  dragSrcIdx = idx;
  setTimeout(() => { const row = document.getElementById(`row-${songs[idx].id}`); if(row) row.classList.add('dragging'); }, 0);
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e, idx) {
  e.preventDefault();
  document.querySelectorAll('.song-row').forEach(r => r.classList.remove('drag-over'));
  const row = document.getElementById(`row-${songs[idx].id}`);
  if (row) row.classList.add('drag-over');
}
function onDrop(e, idx) {
  e.preventDefault();
  if (dragSrcIdx === null || dragSrcIdx === idx) { onDragEnd(); return; }
  const moved = songs.splice(dragSrcIdx, 1)[0];
  songs.splice(idx, 0, moved);
  dragSrcIdx = null;
  renderList();
}
function onDragEnd() {
  document.querySelectorAll('.song-row').forEach(r => { r.classList.remove('dragging'); r.classList.remove('drag-over'); });
  dragSrcIdx = null;
}

// ESC to close modals
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeAddModal(); closeDelModal(); }
});

// INIT
renderList();
</script>
</body>
</html>
