    { text: "Canavarlarla savaşan, canavar olmamaya dikkat etmelidir.", author: "Friedrich Nietzsche", tag: "BİLGELİK" },
    { text: "Tanrı'nın dili sessizliktir; geri kalan her şey kötü bir tercümedir.", author: "Rumi", tag: "VAROLUŞ" },
    { text: "Hayatın fiyatı, onun için verdiğin yaşam miktarıdır.", author: "Henry David Thoreau", tag: "VAROLUŞ" },
    { text: "Kitleler sessiz bir çaresizlik içinde yaşar.", author: "Henry David Thoreau", tag: "TRAJEDY" },
    { text: "Ormana gittim; çünkü kasıtlı yaşamayı istiyordum.", author: "Henry David Thoreau", tag: "VAROLUŞ" },
    { text: "Derin bir nefes aldım ve kalbimin eski övüncüne kulak verdim: Varım, varım, varım.", author: "Sylvia Plath", tag: "VAROLUŞ" },
    { text: "Ölmek bir sanattır. Her şey gibi, bunu da olağanüstü yaparım.", author: "Sylvia Plath", tag: "TRAJEDY" },
    { text: "Fırtınalardan korkmuyorum; çünkü gemimi nasıl kullanacağımı öğreniyorum.", author: "Louisa May Alcott", tag: "ACI" },
    { text: "Mutluluğun tek bir yolu var: kontrolümüz dışındaki şeyler için endişelenmeyi bırakmak.", author: "Epiktetos", tag: "BİLGELİK" },
    { text: "Felsefeni açıklama. Yaşa onu.", author: "Epiktetos", tag: "BİLGELİK" },
    { text: "Zenginlik büyük mülklere sahip olmak değil, çok az istekte bulunmaktır.", author: "Epiktetos", tag: "BİLGELİK" },
    { text: "Elindeki en iyi şekilde kullan; gerisini olduğu gibi kabul et.", author: "Epiktetos", tag: "BİLGELİK" },
    { text: "Önce kendine ne olmak istediğini söyle; sonra gerekeni yap.", author: "Epiktetos", tag: "BİLGELİK" },
    { text: "Sahip olmadığı şeyler için üzülen değil, sahip olduklarından sevinç duyan bilge insandır.", author: "Epiktetos", tag: "BİLGELİK" },
    { text: "İyi ya da kötü diye bir şey yoktur; düşünce onu öyle yapar.", author: "William Shakespeare", tag: "BİLGELİK" },
    { text: "Ne olduğumuzu biliyoruz ama ne olabileceğimizi bilmiyoruz.", author: "William Shakespeare", tag: "VAROLUŞ" },
    { text: "Korkaklar gerçek ölümden önce defalarca ölür; yiğitler ölümü yalnızca bir kez tadar.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Tüm dünya bir sahnedir; erkekler ve kadınlar sadece oyunculardır.", author: "William Shakespeare", tag: "VAROLUŞ" },
    { text: "Suç, sevgili Brutus, yıldızlarımızda değil, bizde yatar.", author: "William Shakespeare", tag: "VAROLUŞ" },
    { text: "Hayat yürüyen bir gölgeden ibarettir; sahnede saatini geçirir ve sonra duyulmaz olur.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Cehennem boş; tüm şeytanlar burada.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Olmak ya da olmamak — işte bütün mesele bu.", author: "William Shakespeare", tag: "VAROLUŞ" },
    { text: "Yarın, ve yarın, ve yarın; küçük adımlarla günden güne sürünüp gider.", author: "William Shakespeare", tag: "TRAJEDY" },
    { text: "Herkesi sev, birkaç kişiye güven, kimseye kötülük etme.", author: "William Shakespeare", tag: "BİLGELİK" },
    { text: "Değişmeyen tek şey değişimin kendisidir.", author: "Heraklitos", tag: "VAROLUŞ" },
    { text: "Aynı nehre iki kez giremezsin.", author: "Heraklitos", tag: "VAROLUŞ" },
    { text: "Karakter kaderdir.", author: "Heraklitos", tag: "VAROLUŞ" },
    { text: "Savaş her şeyin babasıdır.", author: "Heraklitos", tag: "TRAJEDY" },
    { text: "Yukarı çıkış ve aşağı iniş aynı yoldur.", author: "Heraklitos", tag: "VAROLUŞ" },
    { text: "Eğitim bir kap doldurmak değil, ateş yakmaktır.", author: "Sokrates", tag: "BİLGELİK" },
    { text: "Tek bildiğim hiçbir şey bilmediğimdir.", author: "Sokrates", tag: "BİLGELİK" },
    { text: "Değişimin sırrı, eskiyle savaşmak değil, yeni inşa etmek için tüm enerjini kullanmaktır.", author: "Sokrates", tag: "BİLGELİK" },
    { text: "Kendini bulmak için kendi başına düşün.", author: "Sokrates", tag: "BİLGELİK" },
    { text: "Güçlü zihinler fikirleri tartışır; ortalama zihinler olayları; zayıf zihinler insanları.", author: "Sokrates", tag: "BİLGELİK" },
    { text: "Kendi kendini fetheden, bin kez bin kişiyi fetheden birisinden daha büyüktür.", author: "Gautama Buddha", tag: "BİLGELİK" },
    { text: "Öfkeyi tutmak, başkasına fırlatmak niyetiyle sıcak kömür tutmaktır; yanan sensin.", author: "Gautama Buddha", tag: "BİLGELİK" },
    { text: "Geçmişte yaşama, geleceği hayal etme; zihni şimdiki ana yoğunlaştır.", author: "Gautama Buddha", tag: "BİLGELİK" },
    { text: "Hayal gücü bilgiden daha önemlidir.", author: "Albert Einstein", tag: "BİLGELİK" },
    { text: "İki şey sonsuzdur: evren ve insan aptallığı. Evren konusunda emin değilim.", author: "Albert Einstein", tag: "TRAJEDY" },
    { text: "Zekânın ölçüsü değişebilme kapasitesidir.", author: "Albert Einstein", tag: "BİLGELİK" },
    { text: "Tehlikeli olmayan bir fikir, fikir olarak anılmaya değmez.", author: "Oscar Wilde", tag: "BİLGELİK" },
    { text: "Her şeye karşı koyabilirim, ayartma dışında.", author: "Oscar Wilde", tag: "BİLGELİK" },
    { text: "Hepimiz çukurdayız ama bazılarımız yıldızlara bakıyor.", author: "Oscar Wilde", tag: "TRAJEDY" },
    { text: "Düşmanlarını her zaman affet; hiçbir şey onları bu kadar sinir etmez.", author: "Oscar Wilde", tag: "BİLGELİK" },
    { text: "Kendin ol; diğer herkes zaten alınmış.", author: "Oscar Wilde", tag: "VAROLUŞ" },
    { text: "Hayatta yalnızca iki trajedi vardır: biri istediğini elde edememek, diğeri onu elde etmek.", author: "Oscar Wilde", tag: "TRAJEDY" },
    { text: "Deneyim, hatalarımıza verdiğimiz isimden ibarettir.", author: "Oscar Wilde", tag: "BİLGELİK" },
    { text: "Her azizin bir geçmişi, her günahkârın bir geleceği vardır.", author: "Oscar Wilde", tag: "VAROLUŞ" },
    { text: "Acı çekmek çok uzun bir andır. Onu mevsimlere bölemeyiz.", author: "Oscar Wilde", tag: "ACI" },
    { text: "İnsanlara gerçeği söylemek istiyorsan, onları güldür; yoksa seni öldürürler.", author: "Oscar Wilde", tag: "BİLGELİK" },
    { text: "Karanlık karanlığı kovamaz; bunu yalnızca ışık yapabilir.", author: "Martin Luther King Jr.", tag: "ACI" },
    { text: "Önemli şeyler hakkında sessiz kaldığımız gün hayatımız sona ermek başlar.", author: "Martin Luther King Jr.", tag: "TRAJEDY" },
    { text: "Uçamıyorsan koş, koşamıyorsan yürü, yürüyemiyorsan sürün ama ilerlemeye devam et.", author: "Martin Luther King Jr.", tag: "ACI" },
    { text: "Sınırlı hayal kırıklığını kabul etmeliyiz ama sonsuz umudu asla yitirmemeliyiz.", author: "Martin Luther King Jr.", tag: "UMUT" },
    { text: "Düşmanlarımızın sözlerini değil, dostlarımızın sessizliğini hatırlayacağız.", author: "Martin Luther King Jr.", tag: "TRAJEDY" },
    { text: "Göze göz dünyayı kör eder.", author: "Mahatma Gandhi", tag: "BİLGELİK" },
    { text: "Dünyada görmek istediğin değişim ol.", author: "Mahatma Gandhi", tag: "VAROLUŞ" },
    { text: "Önce seni görmezden gelirler, sonra gülerler, sonra seninle savaşırlar — sonra sen kazanırsın.", author: "Mahatma Gandhi", tag: "VAROLUŞ" },
    { text: "Zayıf hiçbir zaman affetmez. Affetmek güçlünün özelliğidir.", author: "Mahatma Gandhi", tag: "BİLGELİK" },
    { text: "Yarın ölecekmiş gibi yaşa. Sonsuza kadar yaşayacakmış gibi öğren.", author: "Mahatma Gandhi", tag: "VAROLUŞ" },
    { text: "İnsan düşüncelerinin ürünüdür. Ne düşünürse o olur.", author: "Mahatma Gandhi", tag: "VAROLUŞ" },
    { text: "Kendinizi bulmanın en iyi yolu başkalarına hizmette kaybolmaktır.", author: "Mahatma Gandhi", tag: "BİLGELİK" },
    { text: "Geleceğe ait, rüyalarının güzelliğine inananlarındır.", author: "Eleanor Roosevelt", tag: "VAROLUŞ" },
    { text: "Rızanız olmadan kimse sizi aşağı hissettiremez.", author: "Eleanor Roosevelt", tag: "BİLGELİK" },
    { text: "Her gün seni korkutan bir şey yap.", author: "Eleanor Roosevelt", tag: "VAROLUŞ" },
    { text: "Her şeyde güzellik var ama herkes onu göremez.", author: "Konfüçyüs", tag: "BİLGELİK" },
    { text: "Durmadığın sürece ne kadar yavaş gittiğin önemli değildir.", author: "Konfüçyüs", tag: "BİLGELİK" },
    { text: "En büyük zaferimiz hiç düşmemekte değil, her düştüğümüzde ayağa kalkmaktadır.", author: "Konfüçyüs", tag: "ACI" },
    { text: "Gerçek bilgi, bilginin sınırlarını bilmektir.", author: "Konfüçyüs", tag: "BİLGELİK" },
    { text: "Öğrenen ama düşünmeyen kaybolur. Düşünen ama öğrenmeyen büyük tehlikededir.", author: "Konfüçyüs", tag: "BİLGELİK" },
    { text: "İntikam yolculuğuna çıkmadan önce iki mezar kaz.", author: "Konfüçyüs", tag: "BİLGELİK" },
    { text: "Hayat aslında basittir; ama biz onu karmaşık yapmakta ısrarcıyız.", author: "Konfüçyüs", tag: "BİLGELİK" },
    { text: "Sevdiğin bir iş seç; hayatında tek bir gün bile çalışmak zorunda kalmazsın.", author: "Konfüçyüs", tag: "VAROLUŞ" },
    { text: "Öfke yükseldiğinde, sonuçlarını düşün.", author: "Konfüçyüs", tag: "BİLGELİK" },
    { text: "Kader diye bir şey yoktur; yalnızca varlık ve var olmanın içinden geçmek için verilen mücadele vardır.", author: "Albert Camus", tag: "VAROLUŞ" },
    { text: "İnsanın tüm mutsuzluğu odada sessizce oturamamasından kaynaklanır.", author: "Blaise Pascal", tag: "TRAJEDY" },
    { text: "Kalbin kendi aklı vardır; akıl bilmez.", author: "Blaise Pascal", tag: "VAROLUŞ" },
    { text: "Sessizlik bazen en iyi cevaptır.", author: "XIV. Dalai Lama", tag: "BİLGELİK" },
    { text: "Hayatımızın amacı mutlu olmaktır.", author: "XIV. Dalai Lama", tag: "VAROLUŞ" },
    { text: "Benim dinim çok basit. Benim dinim nezakettir.", author: "XIV. Dalai Lama", tag: "BİLGELİK" },
    { text: "Mümkün olduğunda nazik ol. Her zaman mümkündür.", author: "XIV. Dalai Lama", tag: "BİLGELİK" },
    { text: "Hayat, istek ile hayal kırıklığı arasında süregelen bir sarkaçtır.", author: "Arthur Schopenhauer", tag: "TRAJEDY" },
    { text: "İnsanın en büyük hatası, mutsuzluğun nedenini dışarıda aramasıdır.", author: "Arthur Schopenhauer", tag: "BİLGELİK" },
    { text: "Acı, ruhun keşfedilmemiş bölgelerine açılan bir kapıdır.", author: "Kahil Gibran", tag: "ACI" },
    { text: "Sevinç ve hüzün aynı kaynaktan akar; biri diğeri olmadan mümkün değildir.", author: "Kahil Gibran", tag: "ACI" },
    { text: "Çalışmak sevginin görünür kılınmasıdır.", author: "Kahil Gibran", tag: "VAROLUŞ" },
    { text: "İnsanlığı sevmek kolaydır; insanları sevmek zordur.", author: "Fyodor Dostoyevski", tag: "TRAJEDY" },
    { text: "Güzellik dünyayı kurtaracak.", author: "Fyodor Dostoyevski", tag: "UMUT" },
    { text: "Eğer Tanrı yoksa, her şey mubah.", author: "Fyodor Dostoyevski", tag: "VAROLUŞ" },
    { text: "Acıyı seven ve acıyla büyüyen biri; sonunda mutlu olur.", author: "Fyodor Dostoyevski", tag: "ACI" },
    { text: "Evren sana cevap vermiyorsa, sen henüz doğru soruyu sormamışsındır.", author: "Alan Watts", tag: "BİLGELİK" },
    { text: "Sen evrenin ta kendisisin; kendinin farkındaki bir varlık.", author: "Alan Watts", tag: "VAROLUŞ" },
    { text: "Gerçeği aramak bir amaç olabilir; onu bulmak ise tehlikeli.", author: "Friedrich Nietzsche", tag: "BİLGELİK" },
    { text: "Tanrısız bir dünyada anlam bulmak, işte asıl kahramanlık budur.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Kendi içindeki kaosu taşıyabilirsen, dans eden bir yıldız doğurabilirsin.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Bize yıkım gibi görünen şey, aslında yenilenmenin ta kendisidir.", author: "Rumi", tag: "ACI" },
    { text: "Aradığın şey sende zaten var. Susup dinle.", author: "Rumi", tag: "BİLGELİK" },
    { text: "Bir ağacın kökü ne kadar derinse, fırtınalara o kadar dayanır.", author: "Rumi", tag: "ACI" },
    { text: "Başkalarını bilmek bilgeliktir; kendini bilmek aydınlanmadır.", author: "Lao Tzu", tag: "BİLGELİK" },
    { text: "Başkalarını fethetmek güçtür; kendini fethetmek gerçek güçtür.", author: "Lao Tzu", tag: "BİLGELİK" },
    { text: "Su gibi ol: yumuşak ama taşı bile delen.", author: "Lao Tzu", tag: "BİLGELİK" },
    { text: "En uzun yolculuk, içe doğru olandır.", author: "Dag Hammarskjöld", tag: "VAROLUŞ" },
    { text: "Kaderimizin çerçevesini seçme hakkımız yoktur. Ama içine ne koyacağımız bizim elimizdedir.", author: "Dag Hammarskjöld", tag: "VAROLUŞ" },
    { text: "Ölüm ışığı söndürmek değildir; şafak sökerken lambayı kapatmaktır.", author: "Rabindranath Tagore", tag: "TRAJEDY" },
    { text: "Yalnızca suya bakıp durarak denizi geçemezsin.", author: "Rabindranath Tagore", tag: "VAROLUŞ" },
    { text: "Kelebek ayları değil anları sayar; ve zamanı yeterlidir.", author: "Rabindranath Tagore", tag: "VAROLUŞ" },
    { text: "Uyudum ve rüyamda hayatın sevinç olduğunu gördüm. Uyandım ve hayatın hizmet olduğunu gördüm. Harekete geçtim ve işte, hizmet sevinçmiş.", author: "Rabindranath Tagore", tag: "VAROLUŞ" },
    { text: "Güneş hayatından çekildiyse ağlama; gözyaşların yıldızları görmeni engeller.", author: "Rabindranath Tagore", tag: "ACI" },
    { text: "İnanç, şafak henüz karanlıkken ışığı hisseden kuştur.", author: "Rabindranath Tagore", tag: "UMUT" },
    { text: "Asla geç değildir — olmak istediğin kişi olmak için.", author: "George Eliot", tag: "VAROLUŞ" },
    { text: "Varoluş özden önce gelir.", author: "Jean-Paul Sartre", tag: "VAROLUŞ" },
    { text: "Beni yok etmeyen şey beni güçlendirir.", author: "Friedrich Nietzsche", tag: "ACI" },
    { text: "Bilinç bir hastalıktır.", author: "Miguel de Unamuno", tag: "TRAJEDY" },
    { text: "Büyüyüm, içimde çokluklar barındırıyorum.", author: "Walt Whitman", tag: "VAROLUŞ" },
    { text: "Canavarlarla savaşan, canavar olmamaya dikkat etmelidir.", author: "Friedrich Nietzsche", tag: "BİLGELİK" },
    { text: "Uyarı olmadan stimulus ile tepki arasında bir boşluk vardır. O boşlukta seçme gücümüz yatar.", author: "Viktor Frankl", tag: "VAROLUŞ" },
    { text: "Hareket etmeyenler zincirlerini fark etmez.", author: "Rosa Luxemburg", tag: "VAROLUŞ" },
    { text: "Ne kadar sessiz olursanız, o kadar çok duyabilirsiniz.", author: "Rumi", tag: "BİLGELİK" },
    { text: "Dün zekiydim, dünyayı değiştirmek istedim. Bugün bilgeyim, kendimi değiştiriyorum.", author: "Rumi", tag: "BİLGELİK" },
    { text: "Hata ve doğru fikrinin ötesinde bir alan var. Orada buluşacağız.", author: "Rumi", tag: "VAROLUŞ" },
    { text: "Bilmenin sanatı neyi görmezden geleceğini bilmektir.", author: "Rumi", tag: "BİLGELİK" },
    { text: "Her şey evrenin içinde; her şeyi kendinden iste.", author: "Rumi", tag: "VAROLUŞ" },
    { text: "Harabenin olduğu yerde bir hazine umudu vardır.", author: "Rumi", tag: "ACI" },
    { text: "Güzelliği gören ruh bazen yalnız yürür.", author: "Johann Wolfgang von Goethe", tag: "YALNIZLIK" },
    { text: "Bilmek yeterli değildir; uygulamalıyız. İstemek yeterli değildir; yapmalıyız.", author: "Johann Wolfgang von Goethe", tag: "VAROLUŞ" },
    { text: "Hiç kimse özgür olduğunu yanlışlıkla düşünenler kadar ümitsiz bir kölelik içinde değildir.", author: "Johann Wolfgang von Goethe", tag: "TRAJEDY" },
    { text: "En zor görülen şey gözünüzün önündekidir.", author: "Johann Wolfgang von Goethe", tag: "BİLGELİK" },
    { text: "Bir insana olduğu gibi davranırsanız, o da öyle kalır. Olması gerektiği gibi davranırsanız, olması gereken olur.", author: "Johann Wolfgang von Goethe", tag: "VAROLUŞ" },
    { text: "İnsan kalbinde taşıdığını dünyada görür.", author: "Johann Wolfgang von Goethe", tag: "VAROLUŞ" },
    { text: "Düşüncelerimizle şekilleniriz; ne düşünürsek o oluruz.", author: "Gautama Buddha", tag: "VAROLUŞ" },
    { text: "Üç şey uzun süre gizli kalamaz: Güneş, ay ve gerçek.", author: "Gautama Buddha", tag: "BİLGELİK" },
    { text: "Zihin her şeydir. Ne düşünürsek o oluruz.", author: "Gautama Buddha", tag: "VAROLUŞ" },
    { text: "Geçmişte yaşama, geleceği hayal etme; zihni şimdiki ana odakla.", author: "Gautama Buddha", tag: "VAROLUŞ" },
    { text: "Öfkeyi tutmak, zehir içip karşı tarafın ölmesini beklemek gibidir.", author: "Gautama Buddha", tag: "BİLGELİK" },
    { text: "Mutluluğa giden bir yol yoktur; mutluluk yolun kendisidir.", author: "Gautama Buddha", tag: "VAROLUŞ" },
    { text: "İyi varmaktan iyi yolculuk etmek daha iyidir.", author: "Gautama Buddha", tag: "VAROLUŞ" },
    { text: "Barış içeridedir. Onu dışarıda arama.", author: "Gautama Buddha", tag: "BİLGELİK" },
    { text: "Sevgiyle durmaya karar verdim. Nefret, taşınacak çok ağır bir yüktür.", author: "Martin Luther King Jr.", tag: "VAROLUŞ" },
    { text: "Karanlık karanlığı kovamaz; bunu sadece ışık yapabilir.", author: "Martin Luther King Jr.", tag: "ACI" },
    { text: "İman, tüm merdiveni göremeden ilk adımı atmaktır.", author: "Martin Luther King Jr.", tag: "VAROLUŞ" },
    { text: "Önemli şeyler hakkında sessiz kaldığımız gün hayatlarımız sona ermeye başlar.", author: "Martin Luther King Jr.", tag: "TRAJEDY" },
    { text: "Doğruyu yapmak için her zaman doğru zaman vardır.", author: "Martin Luther King Jr.", tag: "BİLGELİK" },
    { text: "Uçamıyorsan koş, koşamıyorsan yürü, yürüyemiyorsan sür, ama ne yaparsan yap ilerlemeye devam et.", author: "Martin Luther King Jr.", tag: "ACI" },
    { text: "Sonlu hayal kırıklıklarını kabul etmeliyiz ama sonsuz umudu asla kaybetmemeliyiz.", author: "Martin Luther King Jr.", tag: "UMUT" },
    { text: "Hayatın en kalıcı ve acil sorusu: Başkaları için ne yapıyorsunuz?", author: "Martin Luther King Jr.", tag: "VAROLUŞ" },
    { text: "Hayatta önemli olan uzunluğu değil, kalitesidir.", author: "Martin Luther King Jr.", tag: "VAROLUŞ" },
    { text: "Kardeş olarak birlikte yaşamayı öğrenmeli ya da aptal olarak birlikte yok olmayız.", author: "Martin Luther King Jr.", tag: "TRAJEDY" },
    { text: "İnsanı en çok korkutan cahilliğin eyleme dönüşmesidir.", author: "Johann Wolfgang von Goethe", tag: "BİLGELİK" },
    { text: "Yoksul olan az sahip olan değil; daha fazlasını arzulayandır.", author: "Seneca", tag: "BİLGELİK" },
    { text: "Şans, hazırlığın fırsatla buluştuğunda olanıdır.", author: "Seneca", tag: "BİLGELİK" },
    { text: "Hemen yaşamaya başla ve her günü ayrı bir hayat olarak say.", author: "Seneca", tag: "VAROLUŞ" },
    { text: "Hiç kimse tesadüfen bilge olmadı.", author: "Seneca", tag: "BİLGELİK" },
    { text: "Bu kadar zeki değilim. Sadece sorularla çok daha uzun süre kalıyorum.", author: "Albert Einstein", tag: "BİLGELİK" },
    { text: "Hayal gücü bilgiden daha önemlidir.", author: "Albert Einstein", tag: "VAROLUŞ" },
    { text: "Mantık sizi A'dan B'ye götürür. Hayal gücü ise her yere.", author: "Albert Einstein", tag: "VAROLUŞ" },
    { text: "Hiç hata yapmayan, hiç yeni bir şey denemeyen kişidir.", author: "Albert Einstein", tag: "VAROLUŞ" },
    { text: "Zekanın ölçüsü değişebilme yeteneğidir.", author: "Albert Einstein", tag: "BİLGELİK" },
    { text: "Başarılı bir insan olmaya değil, değerli bir insan olmaya çalış.", author: "Albert Einstein", tag: "VAROLUŞ" },
    { text: "İki şey sonsuzdur: evren ve insan aptallığı; ve evren konusunda emin değilim.", author: "Albert Einstein", tag: "TRAJEDY" },
    { text: "Sorunları onları yaratan düşünce biçimiyle çözemeyiz.", author: "Albert Einstein", tag: "BİLGELİK" },
    { text: "Mutlu bir hayat istiyorsan onu bir hedefe bağla, insanlara ya da eşyalara değil.", author: "Albert Einstein", tag: "VAROLUŞ" },
    { text: "İnsan, hayvan ile Üstün İnsan arasına gerilmiş bir ip; uçurum üzerinde bir iptir.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Ne kadar yükseğe uçarsak, uçamayanların gözünde o kadar küçük görünürüz.", author: "Friedrich Nietzsche", tag: "YALNIZLIK" },
    { text: "Bireylerde delilik nadirdir; ama gruplarda, partilerde, uluslarda ve dönemlerde kuraldır.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "Gerçekler yoktur, yalnızca yorumlar vardır.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Derini değiştiremeyip kalmak zorunda olan yılan ölmek zorundadır.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "İnançlar gerçeğin yalanlardan daha tehlikeli düşmanlarıdır.", author: "Friedrich Nietzsche", tag: "BİLGELİK" },
    { text: "Amacını unutmak en yaygın aptallık biçimidir.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "Tehlikeli yaşa; varoluştan en fazla meyveyi bu şekilde alırsın.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Sevgiden yapılan her şey her zaman iyinin ve kötünün ötesinde gerçekleşir.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Her derin düşünür anlaşılmaktan, anlaşılamamaktan daha çok korkar.", author: "Friedrich Nietzsche", tag: "YALNIZLIK" },
    { text: "Tüm gerçekten büyük düşünceler yürürken tasarlanır.", author: "Friedrich Nietzsche", tag: "BİLGELİK" },
    { text: "En az bir kez dans etmediğimiz her günü kaybolmuş saymalıyız.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "Umut gerçekte tüm kötülüklerin en kötüsüdür; çünkü insanın acısını uzatır.", author: "Friedrich Nietzsche", tag: "TRAJEDY" },
    { text: "İçinde kaos taşımalısın ki dans eden bir yıldız doğurabilsin.", author: "Friedrich Nietzsche", tag: "VAROLUŞ" },
    { text: "İnsanın güce karşı mücadelesi, hafızanın unutmaya karşı mücadelesidir.", author: "Milan Kundera", tag: "TRAJEDY" },
    { text: "Utancın temeli kişisel bir başarısızlık değil, ezilmenin utanç verici yenilgisidir.", author: "Milan Kundera", tag: "ACI" },
    { text: "İnsan zamanı daire çizmez; düz bir çizgide ilerler.", author: "Milan Kundera", tag: "VAROLUŞ" },
    { text: "Mutluluk tekrarın özlemidir.", author: "Milan Kundera", tag: "VAROLUŞ" },
    { text: "İyimserlik halkın afyonudur.", author: "Milan Kundera", tag: "TRAJEDY" },
    { text: "Üzüntü, tutkuyla sevenler için bir mutluluk biçimidir.", author: "Milan Kundera", tag: "ACI" },
    { text: "Işığın derecesi karanlığın derecesiyle ters orantılıdır.", author: "Hermann Hesse", tag: "ACI" },
    { text: "Bazılarımız tutunmanın bizi güçlü kıldığını düşünür; oysa bazen bırakmak gerekir.", author: "Hermann Hesse", tag: "ACI" },
    { text: "İçinde bir sessizlik ve sığınak var; istediğin zaman oraya çekilebilirsin.", author: "Hermann Hesse", tag: "YALNIZLIK" },
    { text: "Başka gerçeklik yok; içimizdeki gerçeklik var. Bu yüzden pek çok kişi gerçek dışı bir hayat sürer.", author: "Hermann Hesse", tag: "VAROLUŞ" },
    { text: "Ciddi alınması gerekeni öğren ve gerisine gül.", author: "Hermann Hesse", tag: "BİLGELİK" },
    { text: "Kuş yumurtadan savaşarak çıkar. Yumurta dünyadır. Doğmak için bir dünyayı yok etmek gerekir.", author: "Hermann Hesse", tag: "VAROLUŞ" },
    { text: "Gerçek benimden gelen dürtülerle yaşamak istedim. Neden bu kadar zordu?", author: "Hermann Hesse", tag: "TRAJEDY" },
    { text: "Gerçeğin milyon yüzü var ama yalnızca tek bir gerçek vardır.", author: "Hermann Hesse", tag: "BİLGELİK" },
    { text: "Birini nefret ediyorsan, onda kendinin bir parçasını nefret ediyorsun demektir.", author: "Hermann Hesse", tag: "BİLGELİK" },
    { text: "İnsan yeni okyanuslar keşfedemez; kıyıyı gözden kaybetme cesareti taşımadıkça.", author: "André Gide", tag: "VAROLUŞ" },
    { text: "Asıl görüş kalple olur; göz için önemli olan görünmezdir.", author: "Antoine de Saint-Exupéry", tag: "BİLGELİK" },
    { text: "Evcilleştirdiğin şeyden sonsuza dek sorumlu olursun.", author: "Antoine de Saint-Exupéry", tag: "VAROLUŞ" },
    { text: "Kendimi başka her şeyden daha çok incelerim; bu benim metafiziğim, bu benim fizikimdir.", author: "Michel de Montaigne", tag: "VAROLUŞ" },
    { text: "Kendini başkalarına ödünç ver; ama kendine kendini ver.", author: "Michel de Montaigne", tag: "BİLGELİK" },
    { text: "Olayları yönetemediğim için kendimi yönetiyorum.", author: "Michel de Montaigne", tag: "BİLGELİK" },
    { text: "Bir şeyi hafızadan silmek istediğimizde, o şey hafızaya en derin şekilde kazınır.", author: "Michel de Montaigne", tag: "ACI" },
    { text: "Dünyanın en büyük şeyi kendine ait olmayı bilmektir.", author: "Michel de Montaigne", tag: "VAROLUŞ" },
    { text: "Dün inanç olarak tuttuğumuz ne çok şeyi bugün masal olarak anlatıyoruz.", author: "Michel de Montaigne", tag: "BİLGELİK" },
    { text: "Bilgeliğin en kesin işareti neşedir.", author: "Michel de Montaigne", tag: "BİLGELİK" },
    { text: "Bir sarayda bile iyi yaşanabilir.", author: "Marcus Aurelius", tag: "STOİZM" },
    { text: "Kaderin sana bağladığı şeyleri kabul et; kaderin yanına getirdiği insanları sev.", author: "Marcus Aurelius", tag: "VAROLUŞ" },
    { text: "Eylemin önündeki engel eylemi ileri iter. Yolun önünde duran şey yol haline gelir.", author: "Marcus Aurelius", tag: "STOİZM" },
    { text: "Karakter mükemmelliği şudur: her günü son günmüş gibi, çılgınlık, ilgisizlik ve yapmacıklık olmadan yaşamak.", author: "Marcus Aurelius", tag: "VAROLUŞ" },
    { text: "En iyi intikam, haksızlık yapana benzememektir.", author: "Marcus Aurelius", tag: "BİLGELİK" },
    { text: "Kayıp, değişimden başka bir şey değildir; değişim ise doğanın zevkidir.", author: "Marcus Aurelius", tag: "TRAJEDY" },
    { text: "Sözünü bozacak ya da özsaygını kaybettirecek hiçbir şeyi avantaj olarak görme.", author: "Marcus Aurelius", tag: "BİLGELİK" },
    { text: "Kendini şimdiki ana hapset.", author: "Marcus Aurelius", tag: "VAROLUŞ" },
    { text: "İlk kural: Ruhunu huzurlu tut. İkincisi: Şeylere yüzleş ve oldukları gibi tanı.", author: "Marcus Aurelius", tag: "STOİZM" },
  ],
  es: [
    { text: "El obstáculo es el camino.", author: "Marco Aurelio", tag: "ESTOICISMO" },
    { text: "Quien tiene un porqué para vivir puede soportar casi cualquier cómo.", author: "Friedrich Nietzsche", tag: "EXISTENCIA" },
    { text: "Sufrimos más en la imaginación que en la realidad.", author: "Séneca", tag: "TRAGEDIA" },
    { text: "Vivir es sufrir; sobrevivir es encontrar sentido en el sufrimiento.", author: "Friedrich Nietzsche", tag: "DOLOR" },
    { text: "La muerte no es nada para nosotros; cuando existimos, la muerte no está presente.", author: "Epicuro", tag: "EXISTENCIA" },
    { text: "La única forma de lidiar con un mundo no libre es volverse tan absolutamente libre que tu mera existencia sea un acto de rebelión.", author: "Albert Camus", tag: "LIBERTAD" },
    { text: "En lo más profundo del invierno, aprendí finalmente que había en mí un verano invencible.", author: "Albert Camus", tag: "DOLOR" },
    { text: "El hombre está condenado a ser libre.", author: "Jean-Paul Sartre", tag: "EXISTENCIA" },
    { text: "Sin música, la vida sería un error.", author: "Friedrich Nietzsche", tag: "VIDA" },
    { text: "Todos estamos solos, nacemos solos, morimos solos.", author: "Hunter S. Thompson", tag: "SOLEDAD" },
    { text: "Cuídate de no perder la sustancia al aferrarte a la sombra.", author: "Esopo", tag: "SABIDURÍA" },
    { text: "Pienso, luego existo.", author: "René Descartes", tag: "EXISTENCIA" },
    { text: "El infierno son los otros.", author: "Jean-Paul Sartre", tag: "TRAGEDIA" },
    { text: "Dios ha muerto. Dios sigue muerto. Y nosotros lo hemos matado.", author: "Friedrich Nietzsche", tag: "EXISTENCIA" },
    { text: "Una vida sin examen no vale la pena vivirse.", author: "Sócrates", tag: "EXISTENCIA" },
    { text: "Hay que imaginarse a Sísifo feliz.", author: "Albert Camus", tag: "TRAGEDIA" },
    { text: "Todo se pierde en el momento en que se gana.", author: "Arthur Schopenhauer", tag: "TRAGEDIA" },
    { text: "La vida es una larga preparación para algo que nunca sucede.", author: "W.B. Yeats", tag: "TRAGEDIA" },
    { text: "La herida es el lugar por donde entra la luz.", author: "Rumi", tag: "DOLOR" },
    { text: "El dolor es inevitable. El sufrimiento es opcional.", author: "Haruki Murakami", tag: "DOLOR" },
    { text: "Ninguna gran mente ha existido sin un toque de locura.", author: "Aristóteles", tag: "EXISTENCIA" },
    { text: "Conócete a ti mismo.", author: "Sócrates", tag: "SABIDURÍA" },
    { text: "Lo que no me destruye me hace más fuerte.", author: "Friedrich Nietzsche", tag: "DOLOR" },
    { text: "El miedo a la muerte viene del miedo a la vida.", author: "Mark Twain", tag: "TRAGEDIA" },
    { text: "Amar es ser vulnerable.", author: "C.S. Lewis", tag: "DOLOR" },
    { text: "La vida es sufrimiento.", author: "Gautama Buda", tag: "DOLOR" },
    { text: "Amor fati — ama tu destino.", author: "Friedrich Nietzsche", tag: "EXISTENCIA" },
    { text: "Estar completamente vivo es estar en dolor.", author: "Fyodor Dostoevsky", tag: "DOLOR" },
    { text: "El hombre es el único animal que debe ser alentado a vivir.", author: "Friedrich Nietzsche", tag: "TRAGEDIA" },
    { text: "No es la muerte lo que un hombre debe temer, sino nunca comenzar a vivir.", author: "Marco Aurelio", tag: "EXISTENCIA" },
    { text: "La tragedia de la vida no es que termine tan pronto, sino que esperamos tanto para comenzarla.", author: "W.M. Lewis", tag: "TRAGEDIA" },
    { text: "El que da luz debe soportar el ardor.", author: "Viktor Frankl", tag: "DOLOR" },
    { text: "Hasta la noche más oscura terminará y el sol saldrá.", author: "Victor Hugo", tag: "ESPERANZA" },
    { text: "Solo hay un problema filosófico verdaderamente serio, y ese es el suicidio.", author: "Albert Camus", tag: "TRAGEDIA" },
    { text: "Lo absurdo nace del enfrentamiento entre la necesidad humana y el silencio irracional del mundo.", author: "Albert Camus", tag: "EXISTENCIA" },
    { text: "La vida debe ser comprendida hacia atrás; pero debe vivirse hacia adelante.", author: "Søren Kierkegaard", tag: "EXISTENCIA" },
    { text: "La angustia es el vértigo de la libertad.", author: "Søren Kierkegaard", tag: "EXISTENCIA" },
    { text: "La forma más común de desesperación es no ser quien eres.", author: "Søren Kierkegaard", tag: "EXISTENCIA" },
    { text: "La pobreza más terrible es la soledad.", author: "Madre Teresa", tag: "SOLEDAD" },
    { text: "Donde hay vida, hay dolor.", author: "Arthur Schopenhauer", tag: "DOLOR" },
    { text: "Todo es vanidad y aflicción de espíritu.", author: "Rey Salomón", tag: "TRAGEDIA" },
    { text: "Eres responsable de lo que no haces.", author: "Jean-Paul Sartre", tag: "EXISTENCIA" },
    { text: "La realidad es simplemente una ilusión, aunque muy persistente.", author: "Albert Einstein", tag: "EXISTENCIA" },
    { text: "Morimos dos veces: cuando dejamos de respirar y cuando alguien dice nuestro nombre por última vez.", author: "Banksy", tag: "TRAGEDIA" },
    { text: "La vida es una tragedia vista de cerca, pero una comedia vista desde lejos.", author: "Charlie Chaplin", tag: "TRAGEDIA" },
    { text: "Las estrellas no pueden brillar sin oscuridad.", author: "D.H. Sidebottom", tag: "DOLOR" },
    { text: "Memento mori — recuerda que morirás.", author: "Tradición Estoica", tag: "EXISTENCIA" },
    { text: "No somos seres humanos teniendo una experiencia espiritual, sino seres espirituales teniendo una experiencia humana.", author: "Pierre Teilhard de Chardin", tag: "EXISTENCIA" },
    { text: "La lucha en sí misma hacia las alturas basta para llenar el corazón de un hombre.", author: "Albert Camus", tag: "EXISTENCIA" },
    { text: "La existencia precede a la esencia.", author: "Jean-Paul Sartre", tag: "EXISTENCIA" },
    { text: "La carga más pesada es una vida no vivida.", author: "C.G. Jung", tag: "TRAGEDIA" },
    { text: "No todos los que vagan están perdidos.", author: "J.R.R. Tolkien", tag: "EXISTENCIA" },
    { text: "No hay sol sin sombra, y es imprescindible conocer la noche.", author: "Albert Camus", tag: "TRAGEDIA" },
    { text: "Nunca sabes lo fuerte que eres hasta que ser fuerte es tu única opción.", author: "Bob Marley", tag: "DOLOR" },
    { text: "En medio de la dificultad yace la oportunidad.", author: "Albert Einstein", tag: "DOLOR" },
    { text: "Vivir es lo más raro del mundo. La mayoría de la gente simplemente existe.", author: "Oscar Wilde", tag: "EXISTENCIA" },
    { text: "Todos estamos rotos. Así es como entra la luz.", author: "Ernest Hemingway", tag: "DOLOR" },
    { text: "No soy lo que me ha pasado. Soy lo que elijo convertirme.", author: "C.G. Jung", tag: "EXISTENCIA" },
    { text: "De las almas más fuertes emergieron del sufrimiento; los caracteres más grandes están marcados por cicatrices.", author: "Khalil Gibran", tag: "DOLOR" },
    { text: "No son los años en tu vida lo que cuenta. Es la vida en tus años.", author: "Abraham Lincoln", tag: "EXISTENCIA" },
    { text: "Somos el universo experimentándose a sí mismo.", author: "Alan Watts", tag: "EXISTENCIA" },
    { text: "El sufrimiento no es un castigo, es una purificación.", author: "Paramahansa Yogananda", tag: "DOLOR" },
    { text: "Hasta que no hagas consciente lo inconsciente, dirigirá tu vida y lo llamarás destino.", author: "C.G. Jung", tag: "SABIDURÍA" },
    { text: "En el centro de tu ser tienes la respuesta.", author: "Lao Tzu", tag: "SABIDURÍA" },
    { text: "La sabiduría comienza en el asombro.", author: "Sócrates", tag: "SABIDURÍA" },
    { text: "La verdad raramente es pura y nunca simple.", author: "Oscar Wilde", tag: "SABIDURÍA" },
    { text: "Solo los muertos han visto el fin de la guerra.", author: "Platón", tag: "TRAGEDIA" },
    { text: "El hombre sufre más por el sufrimiento que teme pero que nunca llega.", author: "Fyodor Dostoevsky", tag: "DOLOR" },
    { text: "Sé amable, porque cada persona que conoces está librando una dura batalla.", author: "Platón", tag: "DOLOR" },
    { text: "La conciencia es una enfermedad.", author: "Miguel de Unamuno", tag: "TRAGEDIA" },
    { text: "Soy grande, contengo multitudes.", author: "Walt Whitman", tag: "EXISTENCIA" },
    { text: "La realidad es aquello que, cuando dejas de creer en ello, no desaparece.", author: "Philip K. Dick", tag: "EXISTENCIA" },
    { text: "Quien lucha contra monstruos debe cuidar de no convertirse en monstruo.", author: "Friedrich Nietzsche", tag: "SABIDURÍA" },
    { text: "El lenguaje de Dios es el silencio; todo lo demás es una mala traducción.", author: "Rumi", tag: "EXISTENCIA" },
    { text: "El precio de cualquier cosa es la cantidad de vida que intercambias por ella.", author: "Henry David Thoreau", tag: "EXISTENCIA" },
    { text: "La mayoría de los hombres llevan vidas de tranquila desesperación.", author: "Henry David Thoreau", tag: "TRAGEDIA" },
    { text: "Fui al bosque porque quería vivir deliberadamente.", author: "Henry David Thoreau", tag: "EXISTENCIA" },
    { text: "El lenguaje del amistad no son palabras sino significados.", author: "Henry David Thoreau", tag: "EXISTENCIA" },
    { text: "Respiré hondo y escuché el viejo bravuconería de mi corazón: estoy, estoy, estoy.", author: "Sylvia Plath", tag: "EXISTENCIA" },
    { text: "Morir es un arte. Como todo lo demás, lo hago excepcionalmente bien.", author: "Sylvia Plath", tag: "TRAGEDIA" },
    { text: "No tengo miedo de las tormentas, porque estoy aprendiendo a navegar mi barco.", author: "Louisa May Alcott", tag: "DOLOR" },
    { text: "Solo hay un camino a la felicidad y es dejar de preocuparnos por las cosas fuera de nuestro control.", author: "Epicteto", tag: "SABIDURÍA" },
    { text: "No expliques tu filosofía. Encárnala.", author: "Epicteto", tag: "SABIDURÍA" },
    { text: "La riqueza no consiste en tener grandes posesiones, sino en tener pocas necesidades.", author: "Epicteto", tag: "SABIDURÍA" },
    { text: "Haz el mejor uso de lo que está en tu poder y toma el resto como sucede.", author: "Epicteto", tag: "SABIDURÍA" },
    { text: "Primero dite a ti mismo lo que serías; luego haz lo que tienes que hacer.", author: "Epicteto", tag: "SABIDURÍA" },
    { text: "El hombre sabio no se aflige por lo que no tiene, sino que se regocija por lo que tiene.", author: "Epicteto", tag: "SABIDURÍA" },
    { text: "No hay nada bueno ni malo; el pensamiento lo hace así.", author: "William Shakespeare", tag: "SABIDURÍA" },
    { text: "Sé fiel a ti mismo.", author: "William Shakespeare", tag: "SABIDURÍA" },
    { text: "Sabemos lo que somos, pero no lo que podemos ser.", author: "William Shakespeare", tag: "EXISTENCIA" },
    { text: "Los cobardes mueren muchas veces antes de su muerte; los valientes nunca prueban la muerte sino una vez.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "Todo el mundo es un escenario, y todos los hombres y mujeres meramente actores.", author: "William Shakespeare", tag: "EXISTENCIA" },
    { text: "La culpa, querido Bruto, no está en nuestras estrellas, sino en nosotros mismos.", author: "William Shakespeare", tag: "EXISTENCIA" },
    { text: "La vida no es más que una sombra ambulante, un pobre actor que se pavonea durante su hora en el escenario.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "El infierno está vacío y todos los demonios están aquí.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "Ser o no ser, esa es la cuestión.", author: "William Shakespeare", tag: "EXISTENCIA" },
    { text: "Hay más cosas en el cielo y en la tierra, Horacio, que las soñadas en tu filosofía.", author: "William Shakespeare", tag: "EXISTENCIA" },
    { text: "Mañana, y mañana, y mañana, se arrastra a este paso mezquino de día en día.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "Apaga, apaga, breve vela. La vida no es más que una sombra ambulante.", author: "William Shakespeare", tag: "TRAGEDIA" },
    { text: "Ama a todos, confía en pocos, no hagas daño a nadie.", author: "William Shakespeare", tag: "SABIDURÍA" },
    { text: "No hay nada permanente excepto el cambio.", author: "Heráclito", tag: "EXISTENCIA" },
    { text: "No puedes entrar dos veces en el mismo río.", author: "Heráclito", tag: "EXISTENCIA" },
    { text: "El carácter es el destino.", author: "Heráclito", tag: "EXISTENCIA" },
    { text: "La guerra es el padre de todas las cosas.", author: "Heráclito", tag: "TRAGEDIA" },
    { text: "El camino hacia arriba y el camino hacia abajo son el mismo.", author: "Heráclito", tag: "EXISTENCIA" },
    { text: "La armonía oculta es mejor que la armonía obvia.", author: "Heráclito", tag: "SABIDURÍA" },
    { text: "La educación es encender una llama, no llenar un recipiente.", author: "Sócrates", tag: "SABIDURÍA" },
    { text: "Solo sé que no sé nada.", author: "Sócrates", tag: "SABIDURÍA" },
    { text: "El secreto del cambio es enfocar toda tu energía no en luchar contra lo viejo, sino en construir lo nuevo.", author: "Sócrates", tag: "SABIDURÍA" },
    { text: "Para encontrarte a ti mismo, piensa por ti mismo.", author: "Sócrates", tag: "SABIDURÍA" },
    { text: "Las mentes fuertes discuten ideas, las mentes mediocres discuten eventos, las mentes débiles discuten personas.", author: "Sócrates", tag: "SABIDURÍA" },
    { text: "El que conquista a sí mismo es mayor que el que conquista a mil hombres.", author: "Gautama Buda", tag: "SABIDURÍA" },
    { text: "Mereces tu amor y afecto tanto como cualquier persona en el universo.", author: "Gautama Buda", tag: "EXISTENCIA" },
    { text: "Aferrarse a la ira es como agarrar un carbón ardiente con la intención de arrojárselo a alguien; tú eres el que se quema.", author: "Gautama Buda", tag: "SABIDURÍA" },
    { text: "No vivas en el pasado, no sueñes con el futuro, concentra la mente en el momento presente.", author: "Gautama Buda", tag: "SABIDURÍA" },
    { text: "Somos lo que pensamos. Todo lo que somos surge de nuestros pensamientos.", author: "Gautama Buda", tag: "EXISTENCIA" },
    { text: "Una idea que no es peligrosa no es digna de llamarse idea en absoluto.", author: "Oscar Wilde", tag: "SABIDURÍA" },
    { text: "Puedo resistir todo excepto la tentación.", author: "Oscar Wilde", tag: "SABIDURÍA" },
    { text: "Perdonad siempre a vuestros enemigos; nada les molesta tanto.", author: "Oscar Wilde", tag: "SABIDURÍA" },
    { text: "La experiencia es simplemente el nombre que le damos a nuestros errores.", author: "Oscar Wilde", tag: "SABIDURÍA" },
    { text: "No quiero ir al cielo. Ninguno de mis amigos está allí.", author: "Oscar Wilde", tag: "TRAGEDIA" },
    { text: "Todo santo tiene un pasado y todo pecador tiene un futuro.", author: "Oscar Wilde", tag: "EXISTENCIA" },
    { text: "El sufrimiento es un momento muy largo. No podemos dividirlo por estaciones.", author: "Oscar Wilde", tag: "DOLOR" },
    { text: "Los corazones están hechos para romperse.", author: "Oscar Wilde", tag: "DOLOR" },
    { text: "Si quieres decirle la verdad a la gente, hazlos reír; de lo contrario te matarán.", author: "Oscar Wilde", tag: "SABIDURÍA" },
    { text: "Un cínico es un hombre que conoce el precio de todo y el valor de nada.", author: "Oscar Wilde", tag: "TRAGEDIA" },
    { text: "Hay solo dos tragedias en la vida: una es no conseguir lo que uno quiere, y la otra es conseguirlo.", author: "Oscar Wilde", tag: "TRAGEDIA" },
    { text: "La oscuridad no puede alejar a la oscuridad; solo la luz puede hacerlo.", author: "Martin Luther King Jr.", tag: "DOLOR" },
    { text: "Nuestras vidas comienzan a terminar el día que nos volvemos silenciosos sobre las cosas que importan.", author: "Martin Luther King Jr.", tag: "TRAGEDIA" },
    { text: "La fe es dar el primer paso incluso cuando no ves toda la escalera.", author: "Martin Luther King Jr.", tag: "EXISTENCIA" },
    { text: "Si no puedes volar, corre; si no puedes correr, camina; si no puedes caminar, repta, pero sigue avanzando.", author: "Martin Luther King Jr.", tag: "DOLOR" },
    { text: "Debemos aceptar la decepción finita, pero nunca perder la esperanza infinita.", author: "Martin Luther King Jr.", tag: "ESPERANZA" },
    { text: "Al final recordaremos no las palabras de nuestros enemigos, sino el silencio de nuestros amigos.", author: "Martin Luther King Jr.", tag: "TRAGEDIA" },
    { text: "El arco del universo moral es largo, pero se dobla hacia la justicia.", author: "Martin Luther King Jr.", tag: "ESPERANZA" },
    { text: "Un ojo por un ojo solo termina haciendo al mundo entero ciego.", author: "Mahatma Gandhi", tag: "SABIDURÍA" },
    { text: "Sé el cambio que deseas ver en el mundo.", author: "Mahatma Gandhi", tag: "EXISTENCIA" },
    { text: "Primero te ignoran, luego se ríen de ti, luego luchan contra ti, luego ganas.", author: "Mahatma Gandhi", tag: "EXISTENCIA" },
    { text: "Los débiles nunca pueden perdonar. El perdón es atributo del fuerte.", author: "Mahatma Gandhi", tag: "SABIDURÍA" },
    { text: "Vive como si fueras a morir mañana. Aprende como si fueras a vivir para siempre.", author: "Mahatma Gandhi", tag: "EXISTENCIA" },
    { text: "Un hombre es el producto de sus pensamientos. Lo que piensa, se convierte.", author: "Mahatma Gandhi", tag: "EXISTENCIA" },
    { text: "La mejor forma de encontrarte a ti mismo es perderte en el servicio de los demás.", author: "Mahatma Gandhi", tag: "SABIDURÍA" },
    { text: "Si no tuviera sentido del humor, hace tiempo que me habría suicidado.", author: "Mahatma Gandhi", tag: "TRAGEDIA" },
    { text: "El futuro pertenece a quienes creen en la belleza de sus sueños.", author: "Eleanor Roosevelt", tag: "EXISTENCIA" },
    { text: "Nadie puede hacerte sentir inferior sin tu consentimiento.", author: "Eleanor Roosevelt", tag: "SABIDURÍA" },
    { text: "Haz una cosa cada día que te asuste.", author: "Eleanor Roosevelt", tag: "EXISTENCIA" },
    { text: "El propósito de la vida es vivirla, probar la experiencia al máximo.", author: "Eleanor Roosevelt", tag: "EXISTENCIA" },
    { text: "Todo tiene belleza, pero no todos la ven.", author: "Confucio", tag: "SABIDURÍA" },
    { text: "El hombre que hace una pregunta es un tonto por un minuto; el que no la hace es un tonto para siempre.", author: "Confucio", tag: "SABIDURÍA" },
    { text: "No importa qué tan lento vayas, siempre que no te detengas.", author: "Confucio", tag: "SABIDURÍA" },
    { text: "Nuestra mayor gloria no es nunca caer, sino levantarnos cada vez que caemos.", author: "Confucio", tag: "DOLOR" },
    { text: "El conocimiento real es conocer el alcance de la propia ignorancia.", author: "Confucio", tag: "SABIDURÍA" },
    { text: "El que aprende pero no piensa está perdido. El que piensa pero no aprende está en gran peligro.", author: "Confucio", tag: "SABIDURÍA" },
    { text: "Antes de emprender un viaje de venganza, cava dos tumbas.", author: "Confucio", tag: "SABIDURÍA" },
    { text: "La vida es realmente simple, pero insistimos en hacerla complicada.", author: "Confucio", tag: "SABIDURÍA" },
    { text: "Elige un trabajo que ames y no tendrás que trabajar ni un día de tu vida.", author: "Confucio", tag: "EXISTENCIA" },
    { text: "Cuando la ira se eleva, piensa en las consecuencias.", author: "Confucio", tag: "SABIDURÍA" },
    { text: "La lucha en sí misma hacia las alturas basta para llenar el corazón de un hombre.", author: "Albert Camus", tag: "EXISTENCIA" },
    { text: "No hay destino; solo existe el ser y la lucha por atravesarlo.", author: "Albert Camus", tag: "EXISTENCIA" },
    { text: "Toda la miseria del hombre proviene de no poder sentarse en silencio en una habitación.", author: "Blaise Pascal", tag: "TRAGEDIA" },

let currentLang = 'en';
let quotes = [];
let currentIndex = 0;
let autoTimer = null;
let controlsTimer = null;
let controlsVisible = true;
let frozen = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startApp(lang) {
  currentLang = lang;
  quotes = shuffle(quotesData[lang]);
  currentIndex = 0;

  const langScreen = document.getElementById('lang-screen');
  const app = document.getElementById('app');

  langScreen.style.transition = 'opacity 0.8s';
  langScreen.style.opacity = '0';
  setTimeout(() => {
    langScreen.style.display = 'none';
    app.style.display = 'flex';
    showQuote(true);
    startControlsTimer();
  }, 800);
}

function calcDuration(text) {
  const words = text.split(' ').length;
  const base = Math.max(5000, words * 600);
  return Math.min(base, 15000);
}

function showQuote(initial = false) {
  const q = quotes[currentIndex];
  const container = document.getElementById('quote-container');
  const curtain = document.getElementById('curtain');

  curtain.style.transition = 'none';
  curtain.style.opacity = initial ? '1' : '1';

  setTimeout(() => {
    document.getElementById('quote-line').style.opacity = '0';
    document.getElementById('quote-text').innerHTML = `"${q.text}"`;
    document.getElementById('quote-text').style.opacity = '0';
    document.getElementById('quote-author').textContent = `— ${q.author}`;
    document.getElementById('quote-author').style.opacity = '0';
    document.getElementById('quote-tag').textContent = `[ ${q.tag} ]`;
    document.getElementById('quote-tag').style.opacity = '0';

    container.classList.remove('quote-animate');
    void container.offsetWidth;
    container.classList.add('quote-animate');

    curtain.style.transition = 'opacity 1.4s ease';
    curtain.style.opacity = '0';

    document.getElementById('counter').textContent =
      `${String(currentIndex + 1).padStart(2,'0')} / ${String(quotes.length).padStart(2,'0')}`;

    const duration = calcDuration(q.text);
    const bar = document.getElementById('progress-bar');
    bar.style.transition = 'none';
    bar.style.width = '0%';
    void bar.offsetWidth;
    bar.style.transition = `width ${duration}ms linear`;
    bar.style.width = '100%';

    if (autoTimer) clearTimeout(autoTimer);
    autoTimer = setTimeout(() => nextQuote(), duration);

  }, initial ? 700 : 200);
}

function toggleFreeze() {
  frozen = !frozen;
  const btn = document.getElementById('freeze-btn');
  const bar = document.getElementById('progress-bar');
  if (frozen) {
    if (autoTimer) clearTimeout(autoTimer);
    bar.style.transition = 'none';
    btn.classList.add('active');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>RESUME`;
    showToast('❄ Donduruldu');
  } else {
    btn.classList.remove('active');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/><line x1="19.07" y1="4.93" x2="4.93" y2="19.07"/></svg>FREEZE`;
    // Restart auto-advance
    const q = quotes[currentIndex];
    const duration = calcDuration(q.text);
    bar.style.transition = 'none';
    bar.style.width = '0%';
    void bar.offsetWidth;
    bar.style.transition = `width ${duration}ms linear`;
    bar.style.width = '100%';
    autoTimer = setTimeout(() => nextQuote(), duration);
    showToast('▶ Devam ediyor');
  }
}

function nextQuote() {
  if (frozen) return;
  currentIndex = (currentIndex + 1) % quotes.length;
  if (currentIndex === 0) quotes = shuffle(quotes);
  triggerTransition();
}

function prevQuote() {
  if (frozen) return;
  currentIndex = (currentIndex - 1 + quotes.length) % quotes.length;
  triggerTransition();
}

function triggerTransition() {
  const curtain = document.getElementById('curtain');
  curtain.style.transition = 'opacity 0.8s ease';
  curtain.style.opacity = '1';
  if (autoTimer) clearTimeout(autoTimer);
  setTimeout(() => showQuote(), 850);
}

// Click anywhere to advance
document.getElementById('app').addEventListener('click', function(e) {
  const ctrl = document.getElementById('controls');
  if (ctrl.contains(e.target)) return;
  if (frozen) return;
  nextQuote();
  resetControlsTimer();
});

// Controls hide/show
function startControlsTimer() {
  if (controlsTimer) clearTimeout(controlsTimer);
  controlsTimer = setTimeout(() => {
    document.getElementById('controls').style.opacity = '0';
    document.getElementById('counter').style.opacity = '0';
    controlsVisible = false;
  }, 10000);
}

function resetControlsTimer() {
  document.getElementById('controls').style.opacity = '1';
  document.getElementById('counter').style.opacity = '1';
  controlsVisible = true;
  startControlsTimer();
}

document.addEventListener('mousemove', resetControlsTimer);
document.addEventListener('touchstart', resetControlsTimer);

// Screenshot
function takeScreenshot() {
  const flash = document.getElementById('flash');
  flash.style.transition = 'none';
  flash.style.opacity = '0.85';
  setTimeout(() => {
    flash.style.transition = 'opacity 0.6s ease';
    flash.style.opacity = '0';
  }, 80);

  // Hide controls before capture
  const controls = document.getElementById('controls');
  const counter = document.getElementById('counter');
  const prevOpC = controls.style.opacity;
  const prevOpN = counter.style.opacity;
  controls.style.opacity = '0';
  counter.style.opacity = '0';

  setTimeout(() => {
    html2canvas(document.body, {
      backgroundColor: '#000000',
      scale: window.devicePixelRatio || 2,
      useCORS: true,
      logging: false
    }).then(canvas => {
      controls.style.opacity = prevOpC;
      counter.style.opacity = prevOpN;
      const a = document.createElement('a');
      a.download = 'philosophy-quote.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    }).catch(() => {
      controls.style.opacity = prevOpC;
      counter.style.opacity = prevOpN;
      showToast('⚠ İndirme başarısız');
    });
  }, 150);
}

function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = `
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      background:rgba(0,0,0,0.92); border:1px solid rgba(200,169,110,0.4);
      color:#c8a96e; font-family:'Share Tech Mono',monospace;
      font-size:14px; letter-spacing:0.2em; padding:18px 32px;
      z-index:9999; pointer-events:none; text-align:center;
      transition:opacity 0.4s ease; white-space:nowrap;
    `;
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { toast.style.opacity = '0'; }, 2800);
}

// Font size
let fontSize = 32;
const minFont = 16, maxFont = 56;
function changeFontSize(dir) {
  fontSize = Math.min(maxFont, Math.max(minFont, fontSize + dir * 2));
  document.getElementById('quote-text').style.fontSize = fontSize + 'px';
  showToast('Aa  ' + fontSize + 'px');
}

// Fullscreen
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); if (!frozen) { nextQuote(); resetControlsTimer(); } }
  if (e.key === 'ArrowLeft') { e.preventDefault(); if (!frozen) { prevQuote(); resetControlsTimer(); } }
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === ' ' && frozen) { e.preventDefault(); toggleFreeze(); }
  if (e.key === 'p' || e.key === 'P') toggleFreeze();
  if (e.key === 's' || e.key === 'S') takeScreenshot();
});
</script>
