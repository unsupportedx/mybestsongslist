<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Top Songs</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080810;--surface:#0e0e1a;--surface2:#13131f;
  --border:rgba(255,255,255,0.07);--border-gold:rgba(212,175,80,0.35);
  --gold:#d4af50;--gold-dim:#a07830;--gold-glow:rgba(212,175,80,0.12);
  --text:#f0e8d0;--text-dim:#7a7060;--text-mid:#b0a088;
  --red:#e05050;--green:#50c878;--radius:12px;
  --tr:0.18s cubic-bezier(0.4,0,0.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{background:var(--bg);font-family:'DM Mono',monospace;color:var(--text);overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}

/* ── PAGES ── */
.page{min-height:100vh;width:100%}
#page-auth{display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
#page-app{display:none}

/* ── AUTH ── */
.auth-wrap{width:100%;max-width:400px}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo-icon{width:52px;height:52px;border-radius:50%;background:conic-gradient(from 0deg,#d4af50,#a07830,#d4af50);display:inline-flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px;animation:spin 10s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.auth-logo h1{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--text)}
.auth-logo h1 em{color:var(--gold);font-style:italic}
.auth-logo p{font-size:10px;color:var(--text-dim);letter-spacing:2px;margin-top:6px;text-transform:uppercase}
.auth-card{background:var(--surface);border:1px solid var(--border-gold);border-radius:18px;padding:32px;box-shadow:0 0 60px rgba(212,175,80,0.08),0 24px 48px rgba(0,0,0,0.5)}
.auth-tabs{display:flex;background:var(--bg);border-radius:8px;padding:3px;margin-bottom:24px;gap:3px}
.auth-tab{flex:1;padding:9px;font-family:'DM Mono',monospace;font-size:11px;border:none;cursor:pointer;border-radius:6px;background:transparent;color:var(--text-dim);transition:var(--tr);letter-spacing:0.5px}
.auth-tab.active{background:var(--gold);color:#080810;font-weight:500}
.auth-field{margin-bottom:14px}
.auth-label{font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:6px}
.auth-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color var(--tr)}
.auth-input:focus{border-color:var(--gold)}
.auth-input::placeholder{color:var(--text-dim)}
.auth-submit{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#080810;padding:13px;border-radius:8px;font-family:'DM Mono',monospace;font-weight:500;font-size:12px;border:none;cursor:pointer;margin-top:6px;transition:var(--tr);letter-spacing:1px;text-transform:uppercase}
.auth-submit:hover{opacity:0.88;transform:translateY(-1px)}
.auth-msg{border-radius:8px;padding:10px 14px;font-size:11px;margin-bottom:14px;line-height:1.5;display:none}
.auth-msg.err{background:rgba(224,80,80,0.1);border:1px solid rgba(224,80,80,0.25);color:#f08080;display:block}
.auth-msg.ok{background:rgba(80,200,120,0.1);border:1px solid rgba(80,200,120,0.25);color:#80d4a0;display:block}

/* ── APP HEADER ── */
.header{padding:32px 20px 22px;text-align:center;position:relative;background:linear-gradient(180deg,rgba(20,15,5,0.8) 0%,transparent 100%)}
.header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:50%;height:1px;background:linear-gradient(90deg,transparent,var(--border-gold),transparent)}
.header-logo{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;color:var(--text);letter-spacing:-0.5px;line-height:1}
.header-logo em{color:var(--gold);font-style:italic}
.header-sub{font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-top:6px}
.user-bar{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:16px;flex-wrap:wrap}
.user-pill{display:flex;align-items:center;gap:8px;background:var(--gold-glow);border:1px solid var(--border-gold);border-radius:40px;padding:5px 14px 5px 5px}
.user-av{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dim));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#080810}
.user-nm{font-size:11px;color:var(--gold)}
.btn-out{background:transparent;border:1px solid rgba(224,80,80,0.25);color:#e07070;border-radius:20px;padding:5px 14px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;transition:var(--tr)}
.btn-out:hover{background:rgba(224,80,80,0.1)}
.toolbar{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.tbtn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;border:none;transition:var(--tr);letter-spacing:0.5px}
.tbtn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#080810;font-weight:500}
.tbtn.gold:hover{opacity:0.88;transform:translateY(-1px)}
.tbtn.outline{background:transparent;border:1px solid var(--border-gold);color:var(--gold)}
.tbtn.outline:hover{background:var(--gold-glow)}
.tbtn.ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim);cursor:default}

/* ── LIST ── */
.list-wrap{max-width:800px;margin:0 auto;padding:26px 14px 80px}
.empty{text-align:center;padding:80px 20px}
.empty-icon{font-size:40px;opacity:0.3;margin-bottom:14px}
.empty h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--text-mid)}
.empty p{font-size:10px;color:var(--text-dim);margin-top:6px;letter-spacing:1px}
.row-wrap{position:relative}
.ins-bar{height:26px;display:flex;align-items:center;justify-content:center}
.btn-ins{opacity:0;background:var(--gold-glow);border:1px dashed var(--border-gold);color:var(--gold);border-radius:20px;padding:2px 14px;font-size:10px;font-family:'DM Mono',monospace;cursor:pointer;transition:opacity var(--tr);white-space:nowrap}
.row-wrap:hover .btn-ins{opacity:1}
.song-row{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);margin-bottom:5px;cursor:grab;transition:background var(--tr),border-color var(--tr),box-shadow var(--tr);user-select:none}
.song-row:hover{background:var(--surface2);border-color:rgba(255,255,255,0.1)}
.song-row.r1{border-color:rgba(255,215,0,0.22);background:rgba(255,215,0,0.025)}
.song-row.r2{border-color:rgba(192,192,192,0.18);background:rgba(192,192,192,0.018)}
.song-row.r3{border-color:rgba(205,127,50,0.18);background:rgba(205,127,50,0.025)}
.song-row.dragging{opacity:0.25;cursor:grabbing}
.song-row.dragover{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 0 16px var(--gold-glow)}
.song-row.editing{cursor:default;border-color:var(--border-gold);background:var(--surface2)}
.dh{display:flex;flex-direction:column;gap:3px;padding:3px 2px;opacity:0.18;flex-shrink:0;cursor:grab}
.dh span{width:15px;height:1.5px;background:var(--text);border-radius:1px;display:block}
.song-row:hover .dh{opacity:0.45}
.rank-cell{min-width:42px;text-align:center;flex-shrink:0}
.rn{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;line-height:1}
.rm{font-size:22px;line-height:1}
.song-info{flex:1;min-width:0}
.s-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.s-meta{display:flex;gap:8px;margin-top:3px;align-items:center;flex-wrap:wrap}
.s-artist{font-size:11px;color:var(--gold)}
.s-year{font-size:10px;color:var(--text-dim)}
.s-genre{background:var(--gold-glow);border:1px solid rgba(212,175,80,0.15);border-radius:20px;padding:1px 8px;font-size:9px;color:var(--gold-dim)}
.s-link-print{display:none;font-size:8px;color:#999;margin-top:2px;word-break:break-all}
.edit-fields{flex:1;display:flex;gap:7px;flex-wrap:wrap}
.edit-fields input,.edit-fields select{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;transition:border-color var(--tr)}
.edit-fields input:focus,.edit-fields select:focus{border-color:var(--gold)}
.edit-fields input::placeholder{color:var(--text-dim)}
.ef-t{flex:2 1 130px;border-color:var(--border-gold)!important;font-family:'Cormorant Garamond',serif!important;font-size:15px!important}
.ef-a{flex:1 1 100px}.ef-y{flex:0 1 62px}.ef-g{flex:1 1 88px}.ef-l{flex:2 1 150px;font-size:11px}
.actions{display:flex;gap:5px;flex-shrink:0;align-items:center}
.ab{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr);color:var(--text-dim);flex-shrink:0}
.ab:hover{transform:scale(1.08)}
.ab.lnk{color:var(--gold);border-color:var(--border-gold)}.ab.lnk:hover{background:var(--gold-glow)}
.ab.lnk.off{opacity:0.28;cursor:default;pointer-events:none}
.ab.edt:hover{color:var(--gold);border-color:var(--border-gold);background:var(--gold-glow)}
.ab.del:hover{color:var(--red);border-color:rgba(224,80,80,0.3);background:rgba(224,80,80,0.08)}
.ab.sav{width:auto;padding:0 11px;font-size:11px;font-family:'DM Mono',monospace;color:var(--green);border-color:rgba(80,200,120,0.25);background:rgba(80,200,120,0.1)}
.ab.sav:disabled{opacity:0.3;cursor:not-allowed;transform:none}
.ab.sav:not(:disabled):hover{background:rgba(80,200,120,0.2)}
.ab.cnc:hover{color:var(--text-mid)}
.btn-end{width:100%;background:transparent;border:1px dashed var(--border);color:var(--text-dim);border-radius:var(--radius);padding:12px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;margin-top:8px;transition:var(--tr)}
.btn-end:hover{border-color:var(--border-gold);color:var(--gold)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;backdrop-filter:blur(5px);animation:fi 0.2s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:18px;padding:30px;width:100%;max-width:460px;border:1px solid var(--border-gold);box-shadow:0 32px 64px rgba(0,0,0,0.6);animation:mi 0.22s cubic-bezier(0.16,1,0.3,1)}
@keyframes mi{from{opacity:0;transform:translateY(14px) scale(0.97)}to{opacity:1;transform:none}}
.modal.sm{max-width:340px;text-align:center}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:var(--text);margin-bottom:4px}
.modal-sub{font-size:10px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:22px}
.mf{margin-bottom:13px}
.mf label{font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:5px}
.mf input,.mf select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color var(--tr)}
.mf input:focus,.mf select:focus{border-color:var(--gold)}
.mf input::placeholder{color:var(--text-dim)}
.mf-row{display:flex;gap:10px}.mf-row .mf{flex:1}
.modal-btns{display:flex;gap:8px;margin-top:22px}
.mb{flex:1;padding:12px;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;border:none;transition:var(--tr);letter-spacing:0.5px}
.mb.pri{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#080810;font-weight:500}
.mb.pri:disabled{background:var(--surface2);color:var(--text-dim);cursor:not-allowed}
.mb.pri:not(:disabled):hover{opacity:0.88;transform:translateY(-1px)}
.mb.ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.mb.ghost:hover{border-color:rgba(255,255,255,0.18);color:var(--text-mid)}
.mb.dng{background:rgba(224,80,80,0.1);border:1px solid rgba(224,80,80,0.3);color:var(--red)}
.mb.dng:hover{background:rgba(224,80,80,0.18)}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;right:22px;background:var(--surface2);border:1px solid rgba(80,200,120,0.3);color:var(--green);border-radius:8px;padding:9px 16px;font-size:11px;z-index:600;pointer-events:none;animation:ti 0.3s cubic-bezier(0.16,1,0.3,1)}
@keyframes ti{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── PRINT ── */
.noprint{}.printonly{display:none}
@media print{
  @page{size:A4;margin:16mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#fff!important;color:#111!important}
  #page-auth{display:none!important}
  #page-app{display:block!important}
  .noprint{display:none!important}
  .header{padding:0 0 12px;border-bottom:2px solid #d4af50;text-align:left;background:none}
  .header::after{display:none}
  .header-logo{font-size:26px;color:#111!important}
  .header-logo em{color:#a07830!important}
  .header-sub{color:#888!important;font-size:9px}
  .printonly{display:block!important;font-size:9px;color:#aaa!important;margin-top:2px}
  .list-wrap{padding:10px 0 0;max-width:100%}
  .song-row{display:flex!important;padding:7px 10px;border-radius:5px;border:1px solid #e5ddd0!important;background:#fdfaf5!important;margin-bottom:4px;box-shadow:none!important;cursor:default}
  .song-row.r1{border-color:rgba(212,175,80,0.45)!important;background:#fffef8!important}
  .song-row.r2{border-color:rgba(180,180,180,0.4)!important;background:#fafafa!important}
  .song-row.r3{border-color:rgba(180,120,60,0.35)!important;background:#fffbf5!important}
  .dh,.actions,.ins-bar,.btn-end{display:none!important}
  .rn{color:#a07830!important;font-size:16px}
  .rm{font-size:18px}
  .s-title{font-size:14px!important;color:#111!important;white-space:normal!important}
  .s-artist{color:#a07830!important;font-size:10px}
  .s-year{color:#999!important;font-size:9px}
  .s-genre{background:rgba(212,175,80,0.1)!important;border-color:rgba(212,175,80,0.3)!important;color:#a07830!important;font-size:8px}
  .s-link-print{display:block!important}
  .row-wrap{page-break-inside:avoid}
  .print-footer{display:block!important;text-align:center;font-size:9px;color:#ccc!important;margin-top:20px;padding-top:10px;border-top:1px solid #eee;font-family:'DM Mono',monospace}
}
.print-footer{display:none}
</style>
</head>
<body>

<!-- AUTH PAGE -->
<div id="page-auth" class="page">
  <div class="auth-wrap">
    <div class="auth-logo">
      <div class="auth-logo-icon">🎵</div>
      <h1>My <em>Top</em> Songs</h1>
      <p>Personal Music Collection</p>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-reg" onclick="showTab('reg')">Register</button>
      </div>
      <div id="auth-msg" class="auth-msg"></div>

      <!-- LOGIN -->
      <div id="form-login">
        <div class="auth-field">
          <label class="auth-label">Username</label>
          <input class="auth-input" id="l-user" placeholder="your username" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <div class="auth-field">
          <label class="auth-label">Password</label>
          <input class="auth-input" id="l-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="auth-submit" onclick="doLogin()">Sign In →</button>
      </div>

      <!-- REGISTER -->
      <div id="form-reg" style="display:none">
        <div class="auth-field">
          <label class="auth-label">Username</label>
          <input class="auth-input" id="r-user" placeholder="choose a username" onkeydown="if(event.key==='Enter')doRegister()">
        </div>
        <div class="auth-field">
          <label class="auth-label">Password</label>
          <input class="auth-input" id="r-pass" type="password" placeholder="at least 4 characters" onkeydown="if(event.key==='Enter')doRegister()">
        </div>
        <div class="auth-field">
          <label class="auth-label">Confirm Password</label>
          <input class="auth-input" id="r-pass2" type="password" placeholder="repeat password" onkeydown="if(event.key==='Enter')doRegister()">
        </div>
        <button class="auth-submit" onclick="doRegister()">Create Account →</button>
      </div>
    </div>
  </div>
</div>

<!-- APP PAGE -->
<div id="page-app" class="page" style="display:none">
  <div class="header">
    <div class="header-logo">My <em>Top</em> Songs</div>
    <div class="header-sub" id="h-sub">Personal Music Collection</div>
    <div class="printonly" id="h-date"></div>
    <div class="user-bar noprint">
      <div class="user-pill">
        <div class="user-av" id="u-av">?</div>
        <span class="user-nm" id="u-nm">—</span>
      </div>
      <button class="btn-out" onclick="doLogout()">Sign Out</button>
    </div>
    <div class="toolbar noprint">
      <button class="tbtn gold" onclick="openAdd(null)">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        Add Song
      </button>
      <button class="tbtn outline" onclick="exportPDF()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        Export PDF
      </button>
      <span class="tbtn ghost">↕ Drag to reorder</span>
    </div>
  </div>

  <div class="list-wrap">
    <div id="empty-state" class="empty" style="display:none">
      <div class="empty-icon">♪</div>
      <h3>No songs yet</h3>
      <p>Click "Add Song" to start your collection</p>
    </div>
    <div id="song-list"></div>
    <button class="btn-end noprint" id="btn-end" onclick="openAdd(null)" style="display:none">+ Add to end</button>
    <div class="print-footer" id="p-footer"></div>
  </div>
</div>

<!-- ADD MODAL -->
<div id="m-add" class="overlay" style="display:none" onclick="if(event.target===this)closeAdd()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Add Song</h2>
    <div class="modal-sub" id="m-add-pos">Position —</div>
    <div class="mf">
      <label>Song Title *</label>
      <input id="a-title" placeholder="e.g. Bohemian Rhapsody" oninput="checkAdd()" onkeydown="if(event.key==='Enter')confirmAdd()">
    </div>
    <div class="mf">
      <label>Artist</label>
      <input id="a-artist" placeholder="e.g. Queen" onkeydown="if(event.key==='Enter')confirmAdd()">
    </div>
    <div class="mf-row">
      <div class="mf">
        <label>Year</label>
        <input id="a-year" placeholder="1975" maxlength="4">
      </div>
      <div class="mf">
        <label>Genre</label>
        <select id="a-genre">
          <option value="">— select —</option>
          <option>Pop</option><option>Rock</option><option>Jazz</option><option>Hip-Hop</option>
          <option>R&amp;B</option><option>Electronic</option><option>Classical</option><option>Folk</option>
          <option>Grunge</option><option>Metal</option><option>Soul</option><option>Indie</option>
          <option>Country</option><option>Blues</option><option>Reggae</option><option>Other</option>
        </select>
      </div>
    </div>
    <div class="mf">
      <label>Link (optional)</label>
      <input id="a-link" placeholder="https://open.spotify.com/..." type="url">
    </div>
    <div class="modal-btns">
      <button class="mb pri" id="btn-add-ok" onclick="confirmAdd()" disabled>Add to List</button>
      <button class="mb ghost" onclick="closeAdd()">Cancel</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div id="m-del" class="overlay" style="display:none" onclick="if(event.target===this)closeDel()">
  <div class="modal sm" onclick="event.stopPropagation()">
    <div style="font-size:32px;margin-bottom:12px">🗑</div>
    <h2 style="font-size:20px;margin-bottom:8px">Remove Song?</h2>
    <p style="font-size:11px;color:var(--text-dim);margin-bottom:4px">This cannot be undone.</p>
    <div class="modal-btns" style="margin-top:18px">
      <button class="mb dng" onclick="confirmDel()">Yes, Remove</button>
      <button class="mb ghost" onclick="closeDel()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ─── KEYS
var UK = 'ts_users', SK = 'ts_sess', SQ = 'ts_songs_';

// ─── STATE
var user = null, songs = [], nid = 1000;
var editId = null, delId = null, addAt = null, dragIdx = null, toastTmr = null;

// ─── STORAGE (safe wrappers)
function getUsers()    { try{return JSON.parse(localStorage.getItem(UK)||'{}')}catch(e){return{}} }
function setUsers(u)   { localStorage.setItem(UK,JSON.stringify(u)) }
function getSongs(u)   { try{return JSON.parse(localStorage.getItem(SQ+u)||'[]')}catch(e){return[]} }
function setSongs(u,s) { localStorage.setItem(SQ+u,JSON.stringify(s)) }
function getSess()     { return localStorage.getItem(SK)||'' }
function setSess(u)    { u?localStorage.setItem(SK,u):localStorage.removeItem(SK) }

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

// ─── SIMPLE HASH (no btoa issues)
function hashPw(p){
  var h=5381,i=p.length;
  while(i){h=((h<<5)+h)^p.charCodeAt(--i)}
  return (h>>>0).toString(36);
}

// ─── TOAST
function toast(msg){
  document.querySelectorAll('.toast').forEach(function(e){e.remove()});
  var t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  clearTimeout(toastTmr);
  toastTmr=setTimeout(function(){t.remove()},2200);
}

// ─── PAGE SWITCH
function showPage(p){
  document.getElementById('page-auth').style.display = p==='auth'?'flex':'none';
  document.getElementById('page-app').style.display  = p==='app' ?'block':'none';
}

// ─── AUTH TABS
function showTab(t){
  document.getElementById('tab-login').classList.toggle('active',t==='login');
  document.getElementById('tab-reg').classList.toggle('active',t==='reg');
  document.getElementById('form-login').style.display = t==='login'?'block':'none';
  document.getElementById('form-reg').style.display   = t==='reg'  ?'block':'none';
  setMsg('');
}
function setMsg(msg,type){
  var el=document.getElementById('auth-msg');
  el.className='auth-msg'+(msg&&type?' '+type:'');
  el.textContent=msg;
  el.style.display=msg?'block':'none';
}

// ─── REGISTER
function doRegister(){
  var u=document.getElementById('r-user').value.trim().toLowerCase();
  var p=document.getElementById('r-pass').value;
  var p2=document.getElementById('r-pass2').value;
  if(!u)          return setMsg('Username cannot be empty.','err');
  if(u.length<3)  return setMsg('Username must be at least 3 characters.','err');
  if(!/^[a-z0-9_]+$/.test(u)) return setMsg('Only letters, numbers and _ allowed.','err');
  if(p.length<4)  return setMsg('Password must be at least 4 characters.','err');
  if(p!==p2)      return setMsg("Passwords don't match.",'err');
  var users=getUsers();
  if(users[u])    return setMsg('That username is already taken.','err');
  users[u]={pw:hashPw(p),at:Date.now()};
  setUsers(users);
  setMsg('Account created! You can now sign in.','ok');
  setTimeout(function(){
    showTab('login');
    document.getElementById('l-user').value=u;
  },1200);
}

// ─── LOGIN
function doLogin(){
  var u=document.getElementById('l-user').value.trim().toLowerCase();
  var p=document.getElementById('l-pass').value;
  if(!u||!p) return setMsg('Please fill in all fields.','err');
  var users=getUsers();
  if(!users[u]) return setMsg('No account found with that username.','err');
  if(hashPw(p)!==users[u].pw) return setMsg('Incorrect password.','err');
  setSess(u);
  loadUser(u);
}

// ─── LOGOUT
function doLogout(){
  setSess('');
  user=null; songs=[];
  showPage('auth');
  document.getElementById('l-pass').value='';
  setMsg('');
}

// ─── LOAD USER
function loadUser(u){
  user=u;
  songs=getSongs(u);
  nid=songs.length?songs.reduce(function(m,s){return Math.max(m,s.id)},0)+1:1000;
  document.getElementById('u-nm').textContent=u;
  document.getElementById('u-av').textContent=u[0].toUpperCase();
  showPage('app');
  render();
}

// ─── PERSIST
function persist(){
  if(!user)return;
  setSongs(user,songs);
  toast('✓ Saved');
}

// ─── RANK LABEL
function rankLabel(r){
  if(r===1)return'<span class="rm">🥇</span>';
  if(r===2)return'<span class="rm">🥈</span>';
  if(r===3)return'<span class="rm">🥉</span>';
  var c=r<=10?'var(--gold)':r<=25?'var(--text-mid)':'var(--text-dim)';
  return'<span class="rn" style="color:'+c+'">'+r+'</span>';
}

// ─── LINK ICON SVG
var SVG_LINK='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>';
var SVG_NOLNK='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/><line x1="2" y1="2" x2="22" y2="22"/></svg>';
var SVG_EDIT='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
var SVG_DEL='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>';

function openLink(url){
  if(!url)return;
  window.open(url.indexOf('http')===0?url:'https://'+url,'_blank','noopener,noreferrer');
}

// ─── RENDER
function render(){
  var list=document.getElementById('song-list');
  var empty=document.getElementById('empty-state');
  var endBtn=document.getElementById('btn-end');
  document.getElementById('h-sub').textContent=user+' · '+songs.length+' song'+(songs.length!==1?'s':'');

  if(!songs.length){
    list.innerHTML='';
    empty.style.display='block';
    endBtn.style.display='none';
    return;
  }
  empty.style.display='none';
  endBtn.style.display='block';
  endBtn.textContent='+ Add to end  ·  position '+(songs.length+1);

  var html='';
  for(var i=0;i<songs.length;i++){
    var s=songs[i];
    var rank=i+1;
    var rc=rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
    var isEd=(editId===s.id);

    var insBtn='<div class="ins-bar"><button class="btn-ins" onclick="openAdd('+i+')">+ Insert here · position '+rank+'</button></div>';

    var body;
    if(isEd){
      var genOpts='<option value="">— genre —</option>';
      var gg=['Pop','Rock','Jazz','Hip-Hop','R&B','Electronic','Classical','Folk','Grunge','Metal','Soul','Indie','Country','Blues','Reggae','Other'];
      for(var g=0;g<gg.length;g++) genOpts+='<option'+(gg[g]===(s.genre||'')?' selected':'')+'>'+gg[g]+'</option>';
      body='<div class="edit-fields">'
        +'<input class="ef-t" id="et'+s.id+'" value="'+esc(s.title)+'" placeholder="Song title" oninput="chkSave('+s.id+')">'
        +'<input class="ef-a" id="ea'+s.id+'" value="'+esc(s.artist||'')+'" placeholder="Artist">'
        +'<input class="ef-y" id="ey'+s.id+'" value="'+esc(s.year||'')+'" placeholder="Year" maxlength="4">'
        +'<select class="ef-g" id="eg'+s.id+'">'+genOpts+'</select>'
        +'<input class="ef-l" id="el'+s.id+'" value="'+esc(s.link||'')+'" placeholder="https://... (optional)" type="url">'
        +'</div>'
        +'<div class="actions">'
        +'<button class="ab sav" id="sv'+s.id+'" onclick="saveEdit('+s.id+')"'+(s.title?'':' disabled')+'>✓ Save</button>'
        +'<button class="ab cnc" onclick="cancelEdit()" title="Cancel">✕</button>'
        +'</div>';
    } else {
      var linkBtn=s.link
        ?'<button class="ab lnk" onclick="openLink(\''+esc(s.link)+'\')" title="Open link">'+SVG_LINK+'</button>'
        :'<span class="ab lnk off" title="No link">'+SVG_NOLNK+'</span>';
      body='<div class="song-info">'
        +'<div class="s-title">'+esc(s.title)+'</div>'
        +'<div class="s-meta">'
        +(s.artist?'<span class="s-artist">'+esc(s.artist)+'</span>':'')
        +(s.year?'<span class="s-year">'+esc(s.year)+'</span>':'')
        +(s.genre?'<span class="s-genre">'+esc(s.genre)+'</span>':'')
        +'</div>'
        +(s.link?'<span class="s-link-print">🔗 '+esc(s.link)+'</span>':'')
        +'</div>'
        +'<div class="actions">'
        +linkBtn
        +'<button class="ab edt" onclick="startEdit('+s.id+')" title="Edit">'+SVG_EDIT+'</button>'
        +'<button class="ab del" onclick="openDel('+s.id+')" title="Remove">'+SVG_DEL+'</button>'
        +'</div>';
    }

    html+='<div class="row-wrap">'
      +insBtn
      +'<div class="song-row '+rc+(isEd?' editing':'')+'" id="row'+s.id+'"'
      +' draggable="'+(isEd?'false':'true')+'"'
      +' ondragstart="onDS(event,'+i+')"'
      +' ondragover="onDO(event,'+i+')"'
      +' ondrop="onDP(event,'+i+')"'
      +' ondragend="onDE()"'
      +' ondragleave="onDL(event,'+i+')">'
      +'<div class="dh"><span></span><span></span><span></span></div>'
      +'<div class="rank-cell">'+rankLabel(rank)+'</div>'
      +body
      +'</div></div>';
  }
  list.innerHTML=html;
}

// ─── EDIT
function chkSave(id){
  var btn=document.getElementById('sv'+id);
  if(btn) btn.disabled=!document.getElementById('et'+id).value.trim();
}
function startEdit(id){
  editId=id; render();
  setTimeout(function(){ var el=document.getElementById('et'+id); if(el)el.focus(); },0);
}
function cancelEdit(){ editId=null; render(); }
function saveEdit(id){
  var title=document.getElementById('et'+id).value.trim();
  if(!title)return;
  for(var i=0;i<songs.length;i++){
    if(songs[i].id===id){
      songs[i].title  = title;
      songs[i].artist = document.getElementById('ea'+id).value.trim();
      songs[i].year   = document.getElementById('ey'+id).value.trim();
      songs[i].genre  = document.getElementById('eg'+id).value;
      songs[i].link   = document.getElementById('el'+id).value.trim();
      break;
    }
  }
  editId=null; render(); persist();
}

// ─── ADD
function openAdd(idx){
  addAt=idx;
  ['a-title','a-artist','a-year','a-link'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('a-genre').selectedIndex=0;
  document.getElementById('btn-add-ok').disabled=true;
  var pos=(idx===null?songs.length:idx)+1;
  document.getElementById('m-add-pos').textContent='Will be added at position '+pos;
  document.getElementById('m-add').style.display='flex';
  setTimeout(function(){ document.getElementById('a-title').focus(); },60);
}
function closeAdd(){ document.getElementById('m-add').style.display='none'; }
function checkAdd(){ document.getElementById('btn-add-ok').disabled=!document.getElementById('a-title').value.trim(); }
function confirmAdd(){
  var title=document.getElementById('a-title').value.trim();
  if(!title)return;
  var s={
    id:nid++, title:title,
    artist:document.getElementById('a-artist').value.trim(),
    year:document.getElementById('a-year').value.trim(),
    genre:document.getElementById('a-genre').value,
    link:document.getElementById('a-link').value.trim()
  };
  var idx=(addAt===null)?songs.length:addAt;
  songs.splice(idx,0,s);
  closeAdd(); render(); persist();
}

// ─── DELETE
function openDel(id){ delId=id; document.getElementById('m-del').style.display='flex'; }
function closeDel(){  document.getElementById('m-del').style.display='none'; delId=null; }
function confirmDel(){
  songs=songs.filter(function(s){return s.id!==delId});
  closeDel(); render(); persist();
}

// ─── DRAG & DROP
function onDS(e,idx){
  dragIdx=idx;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',String(idx));
  requestAnimationFrame(function(){
    var s=songs[idx]; if(!s)return;
    var r=document.getElementById('row'+s.id);
    if(r)r.classList.add('dragging');
  });
}
function onDO(e,idx){
  e.preventDefault(); e.dataTransfer.dropEffect='move';
  if(dragIdx===idx)return;
  document.querySelectorAll('.song-row').forEach(function(r){r.classList.remove('dragover')});
  var s=songs[idx]; if(!s)return;
  var r=document.getElementById('row'+s.id);
  if(r)r.classList.add('dragover');
}
function onDL(e,idx){
  if(!e.currentTarget.contains(e.relatedTarget)){
    var s=songs[idx]; if(!s)return;
    var r=document.getElementById('row'+s.id);
    if(r)r.classList.remove('dragover');
  }
}
function onDP(e,idx){
  e.preventDefault();
  if(dragIdx===null||dragIdx===idx){onDE();return;}
  var moved=songs.splice(dragIdx,1)[0];
  songs.splice(idx,0,moved);
  dragIdx=null; render(); persist();
}
function onDE(){
  document.querySelectorAll('.song-row').forEach(function(r){
    r.classList.remove('dragging'); r.classList.remove('dragover');
  });
  dragIdx=null;
}

// ─── PDF EXPORT
function exportPDF(){
  if(!songs.length){toast('⚠ No songs to export');return;}
  var d=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  document.getElementById('h-date').textContent='Exported on '+d;
  document.getElementById('p-footer').textContent='My Top Songs · '+user+' · '+d;
  setTimeout(function(){window.print();},80);
}

// ─── KEYBOARD
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){closeAdd();closeDel();}
});

// ─── INIT
(function(){
  var s=getSess();
  if(s){
    var users=getUsers();
    if(users[s]){loadUser(s);return;}
  }
  showPage('auth');
})();
</script>
</body>
</html>
